<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JJK Sorcerer's Duel v10</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600;700&family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- UI stylesheet (edit gui_ui.css to restyle without touching game code) -->
<link rel="stylesheet" href="gui_ui.css">
<!-- Optional character overrides — drop .js in game folder to customize -->
<script src="itadori.js" onerror="void 0"></script>
<script src="nanami.js" onerror="void 0"></script>
<!-- sounds.js removed — audio engine is fully inline -->
<script src="sounds.js" onerror="void 0"></script>
<script src="debug.js" defer onerror="void 0"></script>
<style>
/* ── CRITICAL BASE STYLES (fallback if gui_ui.css is missing) ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#00d4ff;--red:#e01030;--purple:#7766ff;
  --bg:#030111;--fn:'Oxanium',monospace;--ft:'Bebas Neue',sans-serif;
}
body{background:var(--bg);color:#e8e8e8;font-family:var(--fn);width:100vw;height:100vh;overflow:hidden;position:relative;}

/* CRITICAL: .hidden must always work */
.hidden{display:none!important;}

/* Screens fill viewport */
.screen{
  position:fixed;inset:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg);z-index:1;
}

/* Title screen */
.tc{text-align:center;z-index:2;position:relative;}
#title-cv{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
.t-eye{font-size:11px;letter-spacing:7px;color:rgba(255,255,255,.18);margin-bottom:12px;text-transform:uppercase;}
.t-main{font-family:var(--ft);font-size:clamp(52px,10vw,120px);letter-spacing:5px;
  background:linear-gradient(155deg,#fff 0%,#a8ccff 35%,#fff 60%,#ffb8c8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 50px rgba(0,100,255,.25));}
.t-sub{font-family:var(--ft);font-size:clamp(10px,2vw,22px);letter-spacing:16px;
  background:linear-gradient(90deg,var(--blue),#fff,var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:6px 0 36px;}
.t-btn{
  display:inline-block;font-family:var(--fn);font-size:12px;font-weight:800;letter-spacing:8px;
  padding:16px 60px;text-transform:uppercase;color:var(--blue);cursor:pointer;
  background:rgba(0,180,255,.08);border:1px solid rgba(0,180,255,.35);
  clip-path:polygon(14px 0%,100% 0%,calc(100% - 14px) 100%,0% 100%);
  transition:all .25s;outline:none;
}
.t-btn:hover{background:rgba(0,180,255,.18);border-color:rgba(0,180,255,.7);color:#fff;}
.t-ver{font-size:9px;letter-spacing:4px;color:rgba(255,255,255,.12);margin-top:14px;}

/* Select screen */
.sel-ttl{font-family:var(--ft);font-size:clamp(20px,4vw,42px);letter-spacing:10px;
  background:linear-gradient(90deg,var(--blue),#fff,var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:28px;}
.sel-hint{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.15);margin-top:18px;}
.cards{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
.cc{
  width:160px;min-height:230px;border:1px solid rgba(255,255,255,.06);border-radius:6px;
  padding:0 0 14px;background:rgba(255,255,255,.015);cursor:pointer;overflow:hidden;
  transition:transform .2s,border-color .2s;position:relative;
}
.cc:hover{transform:translateY(-5px);border-color:rgba(255,255,255,.12);}
.c-art{width:100%;height:175px;overflow:hidden;}
.c-art canvas{width:100%;height:100%;}
.c-nm{font-family:var(--ft);font-size:17px;letter-spacing:2px;padding:6px 10px 2px;}
.c-type{font-size:7px;letter-spacing:3px;padding:0 10px;margin-bottom:4px;}
.c-qt{font-size:8px;color:rgba(255,255,255,.22);padding:0 10px;line-height:1.5;}

/* Transition screen */
#s-trans{background:#000;}
.tr-line{width:60%;height:1px;background:rgba(255,255,255,.08);transform:scaleX(0);transition:transform .5s;}
.tr-line.on{transform:scaleX(1);}
.tr-nm{font-family:var(--ft);font-size:clamp(30px,7vw,80px);letter-spacing:6px;opacity:0;transform:translateY(12px);transition:opacity .5s,transform .5s;margin:18px 0 6px;}
.tr-nm.on{opacity:1;transform:translateY(0);}
.tr-qt{font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.35);opacity:0;transition:opacity .6s .15s;}
.tr-qt.on{opacity:1;}

/* Battle screen layout */
#s-battle{flex-direction:column;justify-content:flex-start;padding:0;}
#bfield{position:absolute;inset:0;z-index:0;}
#bfield canvas{width:100%;height:100%;}
#bhud{position:absolute;top:0;left:0;right:0;z-index:3;padding:10px;}
#bbot{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  background:rgba(3,1,17,.88);border-top:1px solid rgba(255,255,255,.06);
  padding:10px 14px 12px;
}
.overlay{position:fixed;inset:0;pointer-events:none;z-index:5;}
#dom-ov,#clash-ov{position:fixed;inset:0;pointer-events:none;z-index:6;display:none;}
#dom-cv,#clash-cv{width:100%;height:100%;}

/* HUD boxes */
.hud-box{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06);border-radius:5px;padding:8px 10px;min-width:210px;max-width:250px;}
.hud-box.enemy{position:absolute;top:10px;right:10px;}
.hud-box.player-hud{position:absolute;top:10px;left:10px;}
.hud-in{}
.hud-nm-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.hud-nm{font-family:var(--ft);font-size:17px;letter-spacing:2px;}
.hud-bdg{font-size:7px;letter-spacing:2px;padding:2px 5px;border-radius:3px;border:1px solid transparent;}
.hud-lv{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.25);margin-left:auto;}
.srow{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.slbl{font-size:7px;letter-spacing:2px;color:rgba(255,255,255,.3);width:16px;}
.sbg{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.sfill{height:100%;border-radius:3px;transition:width .35s;}
.sval{font-size:9px;color:rgba(255,255,255,.45);min-width:32px;text-align:right;}
.ce-row .sfill{background:linear-gradient(90deg,#0055aa,#00aaff);}
.st-row{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;min-height:14px;}
.shiki-panel,.mah-panel{margin-top:4px;font-size:8px;color:rgba(255,255,255,.35);}

/* Barrier bar */
#barrier-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:4;width:180px;text-align:center;}
.barrier-lbl{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.25);margin-bottom:3px;}
.barrier-bg{height:4px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.barrier-fill{height:100%;border-radius:3px;transition:width .3s;}
#dom-banner{position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:4;
  font-family:var(--ft);font-size:14px;letter-spacing:5px;color:rgba(255,255,255,.5);text-align:center;pointer-events:none;}
#turn-ind{display:none;}

/* Message box */
#msg-box{
  background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.05);border-radius:4px;
  padding:8px 12px;min-height:38px;margin-bottom:10px;font-size:12px;letter-spacing:.05em;
  color:rgba(255,255,255,.72);line-height:1.5;
}
#msg-cur{animation:blink 1s step-end infinite;}
#msg-cur.off{display:none;}

/* Initiative row */
#init-row{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:9px;}
.init-badge{font-size:8px;letter-spacing:3px;padding:3px 8px;border-radius:3px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);}

/* Turn label */
#turn-lbl{font-size:7px;letter-spacing:3px;color:rgba(255,255,255,.18);}

/* Action menu */
#menu-wrap{position:relative;}
#action-menu{display:flex;flex-direction:column;gap:8px;}
#skills-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
#actions-row{display:flex;gap:6px;}
.m-btn{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:4px;
  padding:7px 8px;cursor:pointer;text-align:left;color:#e8e8e8;transition:all .18s;
  display:flex;flex-direction:column;gap:1px;min-height:54px;
}
.m-btn:hover:not(:disabled){background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);}
.m-btn:disabled{opacity:.3;cursor:default;}
.m-nm{font-family:var(--ft);font-size:13px;letter-spacing:1px;}
.m-sub{font-size:7px;letter-spacing:1px;color:rgba(255,255,255,.28);}
.m-cost{font-size:8px;margin-top:2px;}
.a-btn{
  flex:1;padding:8px 6px;font-size:9px;letter-spacing:3px;font-weight:800;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:4px;
  color:rgba(255,255,255,.55);cursor:pointer;transition:all .18s;text-transform:uppercase;
}
.a-btn:hover:not(:disabled){background:rgba(255,255,255,.09);color:#fff;}
.a-btn:disabled{opacity:.25;cursor:default;}
.sd-active{color:var(--blue)!important;border-color:rgba(0,180,255,.4)!important;}

/* Summon menu */
#summon-menu,#items-menu{display:none;flex-direction:column;gap:8px;}
#summon-grid,#items-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.s-btn,.i-btn{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:4px;
  padding:8px;cursor:pointer;text-align:left;color:#e8e8e8;transition:all .18s;
}
.s-btn:hover:not(:disabled),.i-btn:hover:not(:disabled){background:rgba(255,255,255,.08);}
.s-nm,.i-nm{font-family:var(--ft);font-size:13px;letter-spacing:1px;display:block;}
.s-sub,.i-desc{font-size:7px;color:rgba(255,255,255,.28);display:block;margin-top:1px;}
.i-cnt{font-size:8px;color:rgba(0,210,255,.6);display:block;margin-top:2px;}
.menu-back{margin-top:4px;padding:6px;font-size:9px;letter-spacing:3px;
  background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);
  border-radius:3px;color:rgba(255,255,255,.3);cursor:pointer;width:100%;}
.menu-back:hover{color:rgba(255,255,255,.6);}

/* Type strip */
#type-strip{margin-top:6px;display:flex;gap:10px;align-items:center;font-size:8px;
  color:rgba(255,255,255,.2);letter-spacing:2px;}
.ts-l{color:rgba(255,255,255,.18);}
.ts-v{color:rgba(255,255,255,.55);}

/* Game over screen */
#s-over{gap:14px;}
.go-r{font-family:var(--ft);font-size:clamp(44px,9vw,100px);letter-spacing:8px;}
.go-s{font-size:12px;letter-spacing:4px;color:rgba(255,255,255,.4);}
.go-btn{
  font-family:var(--fn);font-size:10px;font-weight:800;letter-spacing:7px;
  padding:14px 50px;text-transform:uppercase;color:rgba(255,255,255,.6);cursor:pointer;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:4px;
  transition:all .2s;margin-top:8px;
}
.go-btn:hover{background:rgba(255,255,255,.1);color:#fff;}

/* Status badges */
.st-badge{font-size:7px;letter-spacing:1px;padding:2px 5px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);}

/* Damage numbers */
.dmg-num{position:fixed;pointer-events:none;font-family:var(--ft);z-index:20;
  animation:dmg-fly .9s ease-out forwards;white-space:nowrap;}

@keyframes pb{0%,100%{opacity:.65;}50%{opacity:1;}}
@keyframes blink{50%{opacity:0;}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}40%{transform:translateX(9px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
@keyframes dmg-fly{0%{opacity:1;transform:translateY(0) scale(1.15);}80%{opacity:.75;}100%{opacity:0;transform:translateY(-75px) scale(.65);}}
</style>
</head>
<body>
<canvas class="overlay" id="fx-cv"></canvas>
<canvas class="overlay" id="fn-cv"></canvas>
<canvas class="overlay" id="sd-cv"></canvas>
<div id="dom-ov"><canvas id="dom-cv"></canvas></div>
<!-- domain bg rendered inline in fieldCv -->
<div id="clash-ov"><canvas id="clash-cv"></canvas></div>

<div class="screen" id="s-title">
  <canvas id="title-cv"></canvas>
  <div class="tc">
    <div class="t-eye">Jujutsu Kaisen — Fan Game</div>
    <div class="t-main">SORCERER'S DUEL</div>
    <div class="t-sub">SHIBUYA · INCIDENT · ARC</div>
    <button class="t-btn" id="btn-start">⚡ START</button>
    <div class="t-ver">v10.0 — Fixed & Improved</div>
  </div>
</div>

<div class="screen hidden" id="s-select">
  <div class="sel-ttl">Choose Your Sorcerer</div>
  <div class="cards" id="cards-container"></div>
  <div class="sel-hint">[ click to select ]</div>
</div>

<div class="screen hidden" id="s-trans">
  <div class="tr-line" id="tr-t"></div>
  <div class="tr-nm" id="tr-nm"></div>
  <div class="tr-qt" id="tr-qt"></div>
  <div class="tr-line" id="tr-b"></div>
</div>

<div class="screen hidden" id="s-battle">
  <div id="bfield"><canvas id="field-cv"></canvas></div>
  <div id="bhud">
    <!-- Enemy HUD — top right -->
    <div class="hud-box enemy"><div class="hud-in">
      <div class="hud-nm-row"><div class="hud-nm" id="e-name">ENEMY</div><div class="hud-bdg" id="e-badge"></div><div class="hud-lv">MAX</div></div>
      <div class="srow"><span class="slbl">HP</span><div class="sbg"><div class="sfill" id="e-hp-fill"></div></div><span class="sval" id="e-hp-txt">—</span></div>
      <div class="srow ce-row"><span class="slbl">CE</span><div class="sbg"><div class="sfill" id="e-ce-fill"></div></div></div>
      <div class="st-row" id="e-status"></div>
      <div class="shiki-panel" id="e-shiki-panel"></div>
      <div class="mah-panel" id="e-mah-panel"></div>
    </div></div>
    <!-- Player HUD — top left -->
    <div class="hud-box player-hud"><div class="hud-in">
      <div class="hud-nm-row"><div class="hud-nm" id="p-name">PLAYER</div><div class="hud-bdg" id="p-badge"></div></div>
      <div class="srow"><span class="slbl">HP</span><div class="sbg"><div class="sfill" id="p-hp-fill"></div></div><span class="sval" id="p-hp-txt">—</span></div>
      <div class="srow ce-row"><span class="slbl">CE</span><div class="sbg"><div class="sfill" id="p-ce-fill"></div></div></div>
      <div class="st-row" id="p-status"></div>
      <div class="shiki-panel" id="p-shiki-panel"></div>
      <div class="mah-panel" id="p-mah-panel"></div>
    </div></div>

    <div id="barrier-bar"><div class="barrier-lbl" id="barrier-lbl">BARRIER</div><div class="barrier-bg"><div class="barrier-fill" id="barrier-fill" style="width:100%;background:var(--blue);"></div></div></div>
    <div id="dom-banner"></div>
    <div id="turn-ind">TURN 1</div>
  </div>
  <!-- Bottom action panel — full width, no sidebar -->
  <div id="bbot">
    <div id="init-row">
      <span style="color:rgba(255,255,255,.12);font-size:7px;letter-spacing:3px;">ORDER</span>
      <span class="init-badge" id="init-p">YOU</span>
      <span style="color:rgba(255,255,255,.1);font-size:9px;">›</span>
      <span class="init-badge" id="init-e">ENEMY</span>
      <span style="flex:1"></span>
      <span style="color:rgba(255,255,255,.1);font-size:7px;letter-spacing:2px;" id="turn-lbl">TURN 1</span>
    </div>
    <div id="msg-box"><span id="msg-txt"></span><span id="msg-cur" class="off">|</span></div>
    <div id="menu-wrap">
      <!-- Main action menu: 6 skills (3×2) + actions row -->
      <div id="action-menu">
        <div id="skills-row">
          <button class="m-btn" id="mb0"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
          <button class="m-btn" id="mb1"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
          <button class="m-btn" id="mb2"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
          <button class="m-btn" id="mb3"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
          <button class="m-btn" id="mb4"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
          <button class="m-btn" id="mb5"><span class="m-nm"></span><span class="m-sub"></span><span class="m-cost"></span></button>
        </div>
        <div id="actions-row">
          <button class="a-btn" id="btn-defend" onclick="doDefend()">🛡 DEFEND</button>
          <button class="a-btn" id="btn-simple" onclick="doSimpleDomain()" style="display:none">◎ S.DOM</button>
          <button class="a-btn" id="btn-summon" onclick="openSummon()" style="display:none">👥 SUMMON</button>
          <button class="a-btn" id="btn-item" onclick="openItems()">💊 ITEM</button>
        </div>
      </div>
      <!-- Summon overlay: 4 shikigami + Mahoraga -->
      <div id="summon-menu">
        <div id="summon-grid">
          <button class="s-btn" id="sb0"><span class="s-nm"></span><span class="s-sub"></span></button>
          <button class="s-btn" id="sb1"><span class="s-nm"></span><span class="s-sub"></span></button>
          <button class="s-btn" id="sb2"><span class="s-nm"></span><span class="s-sub"></span></button>
          <button class="s-btn" id="sb3"><span class="s-nm"></span><span class="s-sub"></span></button>
          <button class="s-btn" id="sb4" style="grid-column:1/-1"><span class="s-nm"></span><span class="s-sub"></span></button>
        </div>
        <button class="menu-back" onclick="closeSummon()">◀ BACK</button>
      </div>
      <!-- Items overlay -->
      <div id="items-menu">
        <div id="items-grid">
          <button class="i-btn" id="ib0" onclick="doItem(0)"><span class="i-nm"></span><span class="i-desc"></span><span class="i-cnt"></span></button>
          <button class="i-btn" id="ib1" onclick="doItem(1)"><span class="i-nm"></span><span class="i-desc"></span><span class="i-cnt"></span></button>
          <button class="i-btn" disabled style="opacity:.04"></button>
          <button class="i-btn" disabled style="opacity:.04"></button>
        </div>
        <button class="menu-back" onclick="closeItems()">◀ BACK</button>
      </div>
    </div>
    <div id="type-strip">
      <span class="ts-l">TYPE</span><span class="ts-v" id="ts-type">—</span>
      <span class="ts-l">PWR</span><span class="ts-v" id="ts-pow">—</span>
      <span class="ts-l">CE</span><span class="ts-v" id="ts-ce">—</span>
      <span class="ts-l" style="margin-left:4px">EST.DMG</span><span class="ts-v" id="ts-dmg" style="color:rgba(255,120,60,.75)">—</span>
    </div>
  </div>


</div>

<div class="screen hidden" id="s-over">
  <div class="go-r" id="go-res"></div>
  <div class="go-s" id="go-sub"></div>
  <button class="go-btn" onclick="location.reload()">↺ PLAY AGAIN</button>
</div>

<script>
// ╔═══════════════════════════════════════════════════════════════╗
//  JJK SORCERER'S DUEL v7
//  This file is auto-bundled from the modular source files:
//    js/config.js  → Image URLs & game settings  ← EDIT THIS
//    js/data.js    → Characters, shikigami, state factory
//    js/audio.js   → Web Audio procedural engine
//    js/vfx.js     → Canvas sprites, field, animations
//    js/combat.js  → Damage, Mahoraga adaptation, shikigami
//    js/ui.js      → HUD, menus, message system
//    js/ai.js      → Enemy AI
//    js/game.js    → Turn loop, player actions, boot
// ╚═══════════════════════════════════════════════════════════════╝

/* ──────────────────── config.js ──────────────────── */
// ════════════════════════════════════════════════════════════════
//  CONFIG.JS — Image URLs & Game Settings
//
//  ┌─ HOW TO ADD YOUR OWN IMAGES ─────────────────────────────┐
//  │  1. Upload your image to any image host, for example:     │
//  │     • https://imgur.com  (free, upload → get direct link) │
//  │     • Discord: drop in any channel, right-click → copy    │
//  │                                                            │
//  │  2. Get the DIRECT link ending in .png / .jpg / .webp     │
//  │     ✅ https://i.imgur.com/AbCdEfG.png                    │
//  │     ❌ https://imgur.com/gallery/AbCdEfG  (no extension)  │
//  │                                                            │
//  │  3. Paste it between the quotes for that character below   │
//  │                                                            │
//  │  Example:                                                  │
//  │    gojo: 'https://i.imgur.com/AbCdEfG.png'               │
//  │                                                            │
//  │  Leave as '' to use the built-in animated canvas art.     │
//  └──────────────────────────────────────────────────────────┘
// ════════════════════════════════════════════════════════════════

// ── Domain images cache (populated by preloadImages) ────────────
const DOMAIN_IMGS = {};

const IMGS = {};
let imgsLoaded = 0;

function preloadImages(cb){
  const charKeys=Object.keys(IMGS_SRC).filter(k=>IMGS_SRC[k]);
  const domKeys=Object.keys(DOMAIN_IMGS_SRC).filter(k=>DOMAIN_IMGS_SRC[k]);
  const total=charKeys.length+domKeys.length;
  // If no images configured, boot immediately
  if(!total){cb();return;}
  let loaded=0;
  let _done=false;
  const done=()=>{
    loaded++;
    if(!_done && loaded>=total){_done=true;cb();}
  };
  // Timeout safety: if images hang (file:// protocol / missing folder), boot anyway after 1.5s
  const _timeout=setTimeout(()=>{if(!_done){_done=true;cb();}},1500);
  charKeys.forEach(k=>{
    const img=new Image();
    img.onload=()=>{done();};
    img.onerror=()=>{done();};
    img.src=IMGS_SRC[k];IMGS[k]=img;
  });
  domKeys.forEach(k=>{
    const img=new Image();
    img.onload=()=>{done();};
    img.onerror=()=>{done();};
    img.src=DOMAIN_IMGS_SRC[k];DOMAIN_IMGS[k]=img;
  });
}

// ════════════════════════════════════════════════════════════════
//  AUDIO.JS — Procedural sound engine (Web Audio API)
//  No external files needed — sounds are generated in real-time
// ════════════════════════════════════════════════════════════════

class SoundEngine {
  constructor(){
    this._ctx=null;
    // Merge sounds.js overrides if loaded
    if(window._EXTRA_SOUNDS) Object.assign(this._SOUNDS, window._EXTRA_SOUNDS);
  }

  _ctx_get(){
    if(!this._ctx){
      try{ this._ctx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    }
    return this._ctx;
  }

  _osc(freq,type,dur,vol,delay=0){
    const ac=this._ctx_get();if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    const t=ac.currentTime+delay;
    o.type=type;o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(ac.destination);
    o.start(t);o.stop(t+dur);
  }

  _noise(dur,vol=0.4,delay=0){
    const ac=this._ctx_get();if(!ac)return;
    const len=Math.ceil(ac.sampleRate*dur);
    const buf=ac.createBuffer(1,len,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);
    const src=ac.createBufferSource(),g=ac.createGain();
    const t=ac.currentTime+delay;
    src.buffer=buf;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    src.connect(g);g.connect(ac.destination);
    src.start(t);
  }

  // ── File-based sounds (MP3 from sounds/ folder — same as mahoraga.mp3) ─────
  // Just drop any .mp3 with the matching name into sounds/ and it plays automatically.
  // If the file is missing, the built-in procedural sound plays as fallback.
  _SOUNDS={
    start:'sounds/start.mp3', select_gojo:'sounds/select_gojo.mp3',
    select_sukuna:'sounds/select_sukuna.mp3', select_megumi:'sounds/select_megumi.mp3',

    blue:'sounds/blue.mp3', red:'sounds/red.mp3', hollow:'sounds/hollow.mp3',
    dismantle:'sounds/dismantle.mp3', cleave:'sounds/cleave.mp3', furnace:'sounds/furnace.mp3',
    dogs:'sounds/dogs.mp3', nue:'sounds/nue.mp3', serpent:'sounds/serpent.mp3', toad:'sounds/toad.mp3',
    hit:'sounds/hit.mp3', crit:'sounds/crit.mp3', heal:'sounds/heal.mp3',
    domain:'sounds/domain.mp3', domain_break:'sounds/domain_break.mp3',
    infinity:'sounds/infinity.mp3', defend:'sounds/defend.mp3',
    simple_domain:'sounds/simple_domain.mp3', summon:'sounds/summon.mp3',
    miss:'sounds/miss.mp3', adapt:'sounds/adapt.mp3',
    shrine:'sounds/shrine.mp3', void:'sounds/void.mp3',
    shrine_domain:'sounds/shrine_domain.mp3',
    overthrow:'sounds/overthrow.mp3',

    ratio:'sounds/ratio.mp3',

    overtime:'sounds/overtime.mp3',
  };
  _cache={};

  // Try to play an MP3 file. Returns true if the file exists and started playing.
  _tryFile(key){
    const url=this._SOUNDS[key]; if(!url) return false;
    try{
      if(!this._cache[key]){
        const a=new Audio(url);
        a.volume=0.75;
        // Test if loadable — if not, mark as missing so we don't keep retrying
        a.onerror=()=>{ this._cache[key]='missing'; };
        a.load();
        this._cache[key]=a;
      }
      const cached=this._cache[key];
      if(cached==='missing') return false;
      const clone=cached.cloneNode();
      clone.volume=0.75;
      clone.play().catch(()=>{});
      return true;
    }catch(e){ return false; }
  }

  play(type){
    if(!CONFIG.soundEnabled)return;
    if(this._tryFile(type))return; // use MP3 if found
    try{
      switch(type){
        case 'hit':              this._hit();break;
        case 'crit':             this._crit();break;
        case 'miss':             this._miss();break;
        case 'heal':             this._heal();break;
        case 'domain':           this._domain();break;
        case 'void':             this._void_sound();break;
        case 'shrine':           this._shrine();break;
        case 'shrine_domain':    this._shrineDomain();break;
        case 'overthrow':        this._overthrow();break;
        case 'black_flash':      this._blackFlash();break;
        case 'ratio':            this._ratio();break;
        case 'divergent_fist':   this._divergentFist();break;
        case 'overtime':         this._overtime();break;
        case 'chimera':          this._chimera();break;
        case 'summon':           this._summon();break;
        case 'simple_domain':    this._simpleDomain();break;
        case 'infinity':         this._infinity();break;
        case 'adapt':            this._dharmaWheel();break;
        case 'adapt_100':        this._dharmaWheelFull();break;
        case 'domain_break':     this._domainBreak();break;
        case 'defend':           this._defend();break;
        // NEW SOUNDS
        case 'summon_mahoraga':  this._summonMahoraga();break;
        case 'start':            this._startGame();break;
        case 'select_gojo':      this._selectGojo();break;
        case 'select_sukuna':    this._selectSukuna();break;
        case 'select_megumi':    this._selectMegumi();break;
        case 'void_domain':      this._voidDomain();break;
        case 'chimera_domain':   this._chimeraDomain();break;
        case 'megumi_halfhp':    this._megumiDanger();break;
        case 'adapt_sukuna':     this._adaptSukuna();break;
        case 'blue':             this._blue();break;
        case 'red':              this._red();break;
        case 'hollow':           this._hollow();break;
        case 'dismantle':        this._dismantle();break;
        case 'cleave':           this._cleave();break;
        case 'furnace':          this._furnace();break;
        case 'dogs':             this._dogs();break;
        case 'nue':              this._nue();break;
        case 'toad':             this._toad();break;
        case 'serpent':          this._serpent();break;
        case 'bgm_start':        this._bgmStart();break;
      }
    }catch(e){}
  }

  _void_sound(){
    const ac=this._ctx_get();if(!ac)return;
    const o=ac.createOscillator(),g=ac.createGain();
    const t=ac.currentTime;
    o.type='sine';
    o.frequency.setValueAtTime(440,t);
    o.frequency.exponentialRampToValueAtTime(55,t+2.5);
    g.gain.setValueAtTime(0.01,t);g.gain.linearRampToValueAtTime(0.3,t+0.5);
    g.gain.exponentialRampToValueAtTime(0.001,t+2.5);
    o.connect(g);g.connect(ac.destination);
    o.start(t);o.stop(t+2.5);
  }

  // Mahoraga's Divine Overthrow — deep, apocalyptic rumble

    const ac=this._ctx_get();if(!ac)return;
    const t=ac.currentTime;
    [25,35,48].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(f,t);
      o.frequency.linearRampToValueAtTime(f*0.4,t+2);
      g.gain.setValueAtTime(0.35,t+i*0.05);
      g.gain.exponentialRampToValueAtTime(0.001,t+2.2);
      o.connect(g);g.connect(ac.destination);o.start(t+i*0.05);o.stop(t+2.5);
    });
    this._noise(0.4,1.2);
    [1200,2400].forEach((f,i)=>this._osc(f,'square',0.06,0.3,i*0.03));
  }

      o.type='square';o.frequency.setValueAtTime(f,t+i*0.02);
      g.gain.setValueAtTime(0.2,t+i*0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.22+i*0.02);
      o.connect(g);g.connect(ac.destination);o.start(t+i*0.02);o.stop(t+0.28);

  _shrineDomain(){
    const ac=this._ctx_get();if(!ac)return;
    const t=ac.currentTime;
    // Low rumble building
    [30,45,60].forEach((f,i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(f,t+i*0.06);
      o.frequency.linearRampToValueAtTime(f*0.55,t+1.4);
      g.gain.setValueAtTime(0,t+i*0.06);
      g.gain.linearRampToValueAtTime(0.28,t+0.12+i*0.06);
      g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
      o.connect(g);g.connect(ac.destination);o.start(t+i*0.06);o.stop(t+1.8);
    });
    // Heavy slash burst
    this._noise(0.22,0.75);
    [900,1400,1800,2400].forEach((f,i)=>{
      this._osc(f,'sawtooth',0.12,0.22,i*0.04);

    od.type='sine';od.frequency.setValueAtTime(80,t+0.05);
    od.frequency.exponentialRampToValueAtTime(28,t+0.45);
    gd.gain.setValueAtTime(0.55,t+0.05);
    gd.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    od.connect(gd);gd.connect(ac.destination);od.start(t+0.05);od.stop(t+0.55);
    // Second thud echo
    const od2=ac.createOscillator(),gd2=ac.createGain();
    od2.type='sine';od2.frequency.setValueAtTime(65,t+0.3);
    od2.frequency.exponentialRampToValueAtTime(22,t+0.75);
    gd2.gain.setValueAtTime(0.35,t+0.3);

    od2.connect(gd2);gd2.connect(ac.destination);od2.start(t+0.3);od2.stop(t+0.85);
    // High-pitched slash ring-out
    [1200,1600].forEach((f,i)=>{

    });
  }

// BGM — Procedural ambient music system (3 tracks)
// ═══════════════════════════════════════════════════════════
const BGM = (function(){
  let _ctx=null, _nodes=[], _track=0, _running=false;
  function ctx(){ if(!_ctx) try{_ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} return _ctx; }

  // Track 0: Tense atmospheric (title/select)
  function _playTitle(){
    const ac=ctx();if(!ac)return;
    const now=ac.currentTime;
    // Drone pads — very low volume
    [[55,'sine',.018],[110,'sine',.012],[82,'triangle',.01]].forEach(([f,t,v],i)=>{
      const o=ac.createOscillator(),g=ac.createGain(),lfo=ac.createOscillator();
      const lg=ac.createGain();
      lfo.type='sine';lfo.frequency.value=0.08+i*0.03;lg.gain.value=v*0.5;
      lfo.connect(lg);lg.connect(g.gain);
      o.type=t;o.frequency.value=f;
      g.gain.setValueAtTime(v,now);
      o.connect(g);g.connect(ac.destination);
      lfo.start(now);o.start(now);
      _nodes.push(o,lfo);
    });
    // Sporadic high ping
    function ping(delay){
      if(!_running)return;
      const ac2=ctx();if(!ac2)return;
      const t2=ac2.currentTime+delay;
      const freqs=[523,659,784,1047,1319];
      const o2=ac2.createOscillator(),g2=ac2.createGain();
      o2.type='sine';o2.frequency.value=freqs[Math.floor(Math.random()*freqs.length)];
      g2.gain.setValueAtTime(0,t2);g2.gain.linearRampToValueAtTime(0.02,t2+0.05);
      g2.gain.exponentialRampToValueAtTime(0.001,t2+1.2);
      o2.connect(g2);g2.connect(ac2.destination);o2.start(t2);o2.stop(t2+1.5);
      const nextDelay=2.5+Math.random()*4.5;
      setTimeout(()=>ping(0),nextDelay*1000);
    }
    setTimeout(()=>ping(0),1500);
  }

  // Track 1: Battle intensity (mid-battle)
  function _playBattle(){
    const ac=ctx();if(!ac)return;
    // Heavy bass pulse
    function pulse(delay){
      if(!_running)return;
      const ac2=ctx();if(!ac2)return;
      const t2=ac2.currentTime+delay;
      [55,73].forEach((f,i)=>{
        const o=ac2.createOscillator(),g=ac2.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t2+i*0.02);g.gain.linearRampToValueAtTime(0.025,t2+0.03+i*0.02);
        g.gain.exponentialRampToValueAtTime(0.001,t2+0.4+i*0.02);
        o.connect(g);g.connect(ac2.destination);o.start(t2+i*0.02);o.stop(t2+0.5+i*0.02);
      });
      setTimeout(()=>pulse(0),600+Math.random()*200);
    }
    // Tension strings (mid freqs)
    [[220,'sawtooth',.008],[330,'sawtooth',.005],[440,'triangle',.006]].forEach(([f,t,v],i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type=t;o.frequency.value=f;
      const lfo=ac.createOscillator(),lg=ac.createGain();
      lfo.type='sine';lfo.frequency.value=0.15+i*0.07;lg.gain.value=v*0.4;
      lfo.connect(lg);lg.connect(g.gain);
      g.gain.setValueAtTime(v,ac.currentTime);
      o.connect(g);g.connect(ac.destination);
      lfo.start();o.start();_nodes.push(o,lfo);
    });
    setTimeout(()=>pulse(0),500);
  }

  // Track 2: Domain danger (when domain is active)
  function _playDanger(){
    const ac=ctx();if(!ac)return;
    [[40,'sine',.022],[60,'sine',.016],[50,'triangle',.012]].forEach(([f,t,v],i)=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.type=t;o.frequency.value=f;
      const lfo=ac.createOscillator(),lg=ac.createGain();
      lfo.type='sine';lfo.frequency.value=0.05+i*0.02;lg.gain.value=v*0.6;
      lfo.connect(lg);lg.connect(g.gain);
      g.gain.setValueAtTime(v,ac.currentTime);
      o.connect(g);g.connect(ac.destination);
      lfo.start();o.start();_nodes.push(o,lfo);
    });
    // Ominous high whistle
    function whistle(delay){
      if(!_running)return;
      const ac2=ctx();if(!ac2)return;
      const t2=ac2.currentTime+delay;
      const o=ac2.createOscillator(),g=ac2.createGain();
      o.type='sine';o.frequency.setValueAtTime(600+Math.random()*400,t2);
      o.frequency.exponentialRampToValueAtTime(300+Math.random()*200,t2+1.5);
      g.gain.setValueAtTime(0,t2);g.gain.linearRampToValueAtTime(0.012,t2+0.3);
      g.gain.exponentialRampToValueAtTime(0.001,t2+1.8);
      o.connect(g);g.connect(ac2.destination);o.start(t2);o.stop(t2+2);
      setTimeout(()=>whistle(0),3+Math.random()*5);
    }
    setTimeout(()=>whistle(0),1000);
  }

  return {
    start(track=0){
      this.stop();_running=true;_track=track;
      if(track===0)_playTitle();
      else if(track===1)_playBattle();
      else if(track===2)_playDanger();
    },
    stop(){
      _running=false;
      _nodes.forEach(n=>{try{n.stop();}catch(e){}});
      _nodes=[];
    },
    battle(){ if(_track!==1||!_running){this.start(1);} },
    danger(){ if(_track!==2||!_running){this.start(2);} },
    title(){ if(_track!==0||!_running){this.start(0);} }
  };
})();

    ctx.fillStyle='rgba(60,200,80,.9)';ctx.beginPath();ctx.arc(x+sz*.22,y-sz*.42,sz*.07,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f40';ctx.beginPath();ctx.moveTo(x+sz*.27,y-sz*.42);ctx.lineTo(x+sz*.35,y-sz*.44);ctx.lineTo(x+sz*.28,y-sz*.39);ctx.fill();
  } else if(id==='toad'){

function drawActiveShikigami(ctx,char,cx,cy,flipped){
  if(!char.shikigami)return;
  let idx=0;
  Object.entries(char.shikigami).forEach(([k,sk])=>{
    if(!sk||sk.hp<=0)return;
    const dir=flipped?-1:1;
    const sx=cx+dir*(55+idx*52),sy=cy-30;
    const sz=36;
    // Sprite
    drawShikigamiSprite(ctx,k,sx,sy,sz,fieldFrame);
    // HP bar
    ctx.globalAlpha=.85;
    const hpRatio=sk.hp/sk.maxHp;
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(sx-18,sy+4,36,5);
    ctx.fillStyle=hpRatio>.5?'#44cc66':hpRatio>.25?'#ffaa22':'#cc2222';
    ctx.fillRect(sx-18,sy+4,36*hpRatio,5);
    ctx.globalAlpha=1;
    idx++;
  });
}



// Domain background — drawn at the bottom of fieldCv each frame
function drawFieldDomainBg(ctx, W, H, frame){
  if(!G||!G.domainBgActive)return;
  const hasVoid   = G&&G.voidActive&&G.voidTurns>0;
  const hasShrine = G&&G.shrineTurns>0;
  const hasChimera= G&&G.chimera&&G.chimeraTurns>0;
  const domCount  = (hasVoid?1:0)+(hasShrine?1:0)+(hasChimera?1:0);

  // Determine which image to show (clash takes priority)
  let imgKey = null;
  if(domCount>=2)          imgKey='clash';
  else if(hasVoid)         imgKey='void';
  else if(hasShrine)       imgKey='shrine';
  else if(hasChimera)      imgKey='chimera';
  if(!imgKey)return;

  const img=DOMAIN_IMGS[imgKey];
  if(!img||!img.complete||!img.naturalWidth)return;

  // Cover-fit into the full field canvas
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const sc=Math.max(W/iw,H/ih);
  const dw=iw*sc,dh=ih*sc;

  const pulse=0.04*Math.sin(frame*0.025);
  ctx.globalAlpha=0.50+pulse;
  ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
  ctx.globalAlpha=1;

  // Dark tint so the scene art (buildings, characters) stays readable on top
  const tint = imgKey==='clash'   ? 'rgba(0,0,0,0.45)' :
               imgKey==='void'    ? 'rgba(0,0,18,0.38)' :
               imgKey==='shrine'  ? 'rgba(8,0,2,0.40)'  :
                                    'rgba(2,0,10,0.40)';
  ctx.fillStyle=tint;ctx.fillRect(0,0,W,H);
}


function drawField(){
  if(!fieldCv||!fieldCtx){fieldFrame++;requestAnimationFrame(drawField);return;}
  if(document.getElementById('s-battle').classList.contains('hidden')){fieldFrame++;requestAnimationFrame(drawField);return;}
  const W=fieldCv.width,H=fieldCv.height;fieldCtx.clearRect(0,0,W,H);
  const _domActive=G&&G.domainBgActive&&(G.voidTurns>0||G.shrineTurns>0||(G.chimera&&G.chimeraTurns>0));
  // Layer 1: scenario background image
  if(SCENARIO_IMG&&SCENARIO_IMG.complete&&SCENARIO_IMG.naturalWidth>0){
    const siw=SCENARIO_IMG.naturalWidth,sih=SCENARIO_IMG.naturalHeight;
    const ssc=Math.max(W/siw,H/sih);
    fieldCtx.globalAlpha=_domActive?0.22:0.62;
    fieldCtx.drawImage(SCENARIO_IMG,(W-siw*ssc)/2,(H-sih*ssc)/2,siw*ssc,sih*ssc);
    fieldCtx.globalAlpha=1;
    // Dark overlay to keep readability
    fieldCtx.fillStyle=_domActive?'rgba(0,0,0,0.55)':'rgba(0,0,0,0.45)';
    fieldCtx.fillRect(0,0,W,H);
  } else {
    // Fallback sky
    const sky=fieldCtx.createLinearGradient(0,0,0,H*.64);
    sky.addColorStop(0,_domActive?'rgba(1,2,8,0.55)':'#010208');
    sky.addColorStop(.65,_domActive?'rgba(3,5,13,0.55)':'#03050d');
    sky.addColorStop(1,_domActive?'rgba(5,3,18,0.55)':'#050312');
    fieldCtx.fillStyle=sky;fieldCtx.fillRect(0,0,W,H);
  }
  // Layer 2: domain image (above scenario, behind buildings+chars)
  drawFieldDomainBg(fieldCtx,W,H,fieldFrame);
  // Domain color tint overlay (subtle)
  if(G.voidTurns>0)  {fieldCtx.fillStyle='rgba(0,20,60,.18)';fieldCtx.fillRect(0,0,W,H);}
  if(G.shrineTurns>0){fieldCtx.fillStyle='rgba(40,0,8,.18)';fieldCtx.fillRect(0,0,W,H);}
  if(G.chimera)      {fieldCtx.fillStyle='rgba(20,0,45,.18)';fieldCtx.fillRect(0,0,W,H);}
  // Ground line only
  const gY=H*0.72;
  fieldCtx.strokeStyle=G.voidTurns>0?'rgba(0,160,255,.25)':G.shrineTurns>0?'rgba(180,0,30,.25)':G.chimera?'rgba(80,0,200,.22)':'rgba(80,60,140,.15)';
  fieldCtx.lineWidth=1.5;fieldCtx.beginPath();fieldCtx.moveTo(0,gY);fieldCtx.lineTo(W,gY);fieldCtx.stroke();
  // Characters
  const pX=W*.22,pY=gY,eX=W*.76,eY=gY-H*.05;
  const pPlt=fieldCtx.createLinearGradient(pX-W*.14,0,pX+W*.14,0);pPlt.addColorStop(0,(G.pc?.color||'#00d4ff')+'00');pPlt.addColorStop(.5,(G.pc?.color||'#00d4ff')+'30');pPlt.addColorStop(1,(G.pc?.color||'#00d4ff')+'00');
  fieldCtx.fillStyle='rgba(10,8,22,.65)';fieldCtx.fillRect(pX-W*.14,pY,W*.28,H*.02);fieldCtx.strokeStyle=pPlt;fieldCtx.lineWidth=1;fieldCtx.strokeRect(pX-W*.14,pY,W*.28,H*.02);
  const ePlt=fieldCtx.createLinearGradient(eX-W*.12,0,eX+W*.12,0);ePlt.addColorStop(0,(G.ec?.color||'#e01030')+'00');ePlt.addColorStop(.5,(G.ec?.color||'#e01030')+'30');ePlt.addColorStop(1,(G.ec?.color||'#e01030')+'00');
  fieldCtx.fillStyle='rgba(10,8,22,.65)';fieldCtx.fillRect(eX-W*.12,eY,W*.24,H*.02);fieldCtx.strokeStyle=ePlt;fieldCtx.lineWidth=1;fieldCtx.strokeRect(eX-W*.12,eY,W*.24,H*.02);
  if(G.pc&&G.ec){
    const pCv=document.createElement('canvas');pCv.width=145;pCv.height=162;drawCharSprite(pCv,G.pc.isMahoraga?'mahoraga':G.pc.id,fieldFrame);fieldCtx.drawImage(pCv,pX-72,pY-160,145,162);
    if(G.pc.simpleDomainTurns>0)drawSDOverlay(fieldCtx,pX,pY-82,78,G.pc.color,fieldFrame);
    const eCv=document.createElement('canvas');eCv.width=130;eCv.height=148;drawCharSprite(eCv,G.ec.isMahoraga?'mahoraga':G.ec.id,fieldFrame);
    fieldCtx.save();fieldCtx.scale(-1,1);fieldCtx.drawImage(eCv,-(eX+65),eY-146,130,148);fieldCtx.restore();
    if(G.ec.simpleDomainTurns>0)drawSDOverlay(fieldCtx,eX,eY-80,70,G.ec.color,fieldFrame);
    drawActiveShikigami(fieldCtx,G.pc,pX,pY,false);
    drawActiveShikigami(fieldCtx,G.ec,eX,eY,true);
  }
  // Particles
  fieldParts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.ph+=.025;p.life-=.002;if(p.x<0||p.x>1||p.y<0||p.life<=0){p.x=Math.random();p.y=.58+Math.random()*.42;p.life=Math.random()*.5+.3;p.vy=-Math.random()*.002-.0006;}fieldCtx.globalAlpha=p.a*(.5+.5*Math.sin(p.ph))*p.life;fieldCtx.beginPath();fieldCtx.arc(p.x*W,p.y*H,p.r*p.life,0,Math.PI*2);fieldCtx.fillStyle=p.c;fieldCtx.fill();});fieldCtx.globalAlpha=1;
  fieldFrame++;requestAnimationFrame(drawField);
}

function playSimpleDomain(actor,isPlayer,cb){
  const W=sdCv.width,H=sdCv.height;
  const cx=isPlayer?W*.22:W*.76, cy=H*.35;
  const SDC=actor.color||'#ffd700';
  const rgb=hexToRgb(SDC);
  let sf=0;
  const total=138;
  function loop(){
    sdCtx.clearRect(0,0,W,H);
    const t=sf/total;
    sdCtx.save();
    // Phase 1: hand seal glow (0-28)
    if(sf<28){
      const pt=sf/28;
      const sg=sdCtx.createRadialGradient(cx,cy,0,cx,cy,55*pt);
      sg.addColorStop(0,`rgba(${rgb},${.6*pt})`);sg.addColorStop(1,`rgba(${rgb},0)`);
      sdCtx.fillStyle=sg;sdCtx.beginPath();sdCtx.arc(cx,cy,55*pt,0,Math.PI*2);sdCtx.fill();
      // CE wisps rising
      for(let i=0;i<10;i++){
        const wy=cy-(sf*2.5+i*15)%120;
        const wx=cx+Math.sin(sf*.25+i*1.1)*22;
        sdCtx.globalAlpha=.18*(1-Math.abs(wy-cy+60)/120);
        sdCtx.fillStyle=SDC;sdCtx.beginPath();sdCtx.arc(wx,wy,2.5,0,Math.PI*2);sdCtx.fill();
      }
    }
    sdCtx.globalAlpha=1;
    // Phase 2: ground circle + runes (28-60)
    if(sf>=20&&sf<70){
      const pt=Math.min(1,(sf-20)/40);
      const gY=cy+80, circR=72;
      sdCtx.globalAlpha=.75*pt;
      sdCtx.strokeStyle=SDC;sdCtx.lineWidth=2;sdCtx.shadowBlur=14;sdCtx.shadowColor=SDC;
      sdCtx.beginPath();sdCtx.arc(cx,gY,circR,-Math.PI/2,-Math.PI/2+pt*Math.PI*2);sdCtx.stroke();
      sdCtx.beginPath();sdCtx.arc(cx,gY,circR*.58,-Math.PI/2,-Math.PI/2+pt*Math.PI*2);sdCtx.stroke();
      sdCtx.shadowBlur=0;
      const runeC=['◯','△','□','✦','⬡','⊕','∞','✕'];
      sdCtx.font='11px Oxanium';sdCtx.textAlign='center';
      for(let i=0;i<Math.floor(pt*8);i++){
        const a=(i/8)*Math.PI*2;
        sdCtx.fillStyle=SDC;sdCtx.fillText(runeC[i],cx+Math.cos(a)*circR*.8,gY+Math.sin(a)*circR*.25+4);
      }
      if(pt>.4){
        const la=(pt-.4)/.6;
        sdCtx.globalAlpha=.3*la;sdCtx.strokeStyle=SDC;sdCtx.lineWidth=1;
        for(let i=0;i<4;i++){
          const a=(i/4)*Math.PI;
          sdCtx.beginPath();sdCtx.moveTo(cx+Math.cos(a)*circR*.55*la,gY+Math.sin(a)*circR*.22*la);
          sdCtx.lineTo(cx-Math.cos(a)*circR*.55*la,gY-Math.sin(a)*circR*.22*la);sdCtx.stroke();
        }
      }
    }
    sdCtx.globalAlpha=1;
    // Phase 3: bubble expands (50-95)
    if(sf>=50&&sf<100){
      const pt=Math.min(1,(sf-50)/45);
      const ease=pt<.5?2*pt*pt:1-Math.pow(-2*pt+2,2)/2;
      const bR=H*.23*ease;
      const bg=sdCtx.createRadialGradient(cx,cy,0,cx,cy,bR);
      bg.addColorStop(.8,`rgba(${rgb},0)`);bg.addColorStop(.9,`rgba(${rgb},${.1*ease})`);
      bg.addColorStop(.96,`rgba(${rgb},${.22*ease})`);bg.addColorStop(1,`rgba(${rgb},0)`);
      sdCtx.fillStyle=bg;sdCtx.beginPath();sdCtx.arc(cx,cy,bR,0,Math.PI*2);sdCtx.fill();
      sdCtx.strokeStyle=`rgba(${rgb},${.45*ease})`;sdCtx.lineWidth=1.8;
      sdCtx.shadowBlur=20*ease;sdCtx.shadowColor=SDC;
      sdCtx.beginPath();sdCtx.arc(cx,cy,bR,0,Math.PI*2);sdCtx.stroke();sdCtx.shadowBlur=0;
      // Domain interaction sparks
      if((G.voidTurns>0||G.shrineTurns>0)&&pt>.5){
        const da=(pt-.5)*2;
        for(let i=0;i<8;i++){
          const a=(i/8)*Math.PI*2+sf*.08;
          const sx=cx+Math.cos(a)*bR*.93,sy=cy+Math.sin(a)*bR*.68;
          sdCtx.globalAlpha=.55*da*Math.abs(Math.sin(sf*.2+i));
          sdCtx.strokeStyle='rgba(255,255,255,.7)';sdCtx.lineWidth=1.5;
          sdCtx.beginPath();sdCtx.arc(sx,sy,4+2*Math.sin(sf*.25+i),0,Math.PI*2);sdCtx.stroke();
        }
      }
    }
    // Phase 4: outward pulse (90-115)
    if(sf>=90&&sf<118){
      const pt=(sf-90)/28;
      const bR=H*.23,pR=bR+(pt*H*.32);
      sdCtx.globalAlpha=Math.max(0,(1-pt)*.7);
      sdCtx.strokeStyle=SDC;sdCtx.lineWidth=Math.max(.5,3*(1-pt));
      sdCtx.shadowBlur=24;sdCtx.shadowColor=SDC;
      sdCtx.beginPath();sdCtx.arc(cx,cy,pR,0,Math.PI*2);sdCtx.stroke();sdCtx.shadowBlur=0;
      // Sparks on pulse ring
      for(let i=0;i<14;i++){
        const a=(i/14)*Math.PI*2;
        sdCtx.globalAlpha=Math.max(0,(1-pt)*.8*Math.abs(Math.sin(i*1.4)));
        sdCtx.beginPath();sdCtx.arc(cx+Math.cos(a)*pR,cy+Math.sin(a)*pR,2+Math.random()*2,0,Math.PI*2);
        sdCtx.fillStyle=SDC;sdCtx.fill();
      }
    }
    // Phase 5: settle (110-138)
    if(sf>=110){
      const pt=(sf-110)/28;
      const bR=H*.23,pulse=.5+.5*Math.sin(sf*.14);
      const bg2=sdCtx.createRadialGradient(cx,cy,0,cx,cy,bR);
      bg2.addColorStop(.82,`rgba(${rgb},0)`);bg2.addColorStop(.91,`rgba(${rgb},${.1*pulse*pt})`);
      bg2.addColorStop(.97,`rgba(${rgb},${.22*pulse*pt})`);bg2.addColorStop(1,`rgba(${rgb},0)`);
      sdCtx.globalAlpha=pt;sdCtx.fillStyle=bg2;sdCtx.beginPath();sdCtx.arc(cx,cy,bR,0,Math.PI*2);sdCtx.fill();
      sdCtx.strokeStyle=`rgba(${rgb},${(.4+.3*pulse)*pt})`;sdCtx.lineWidth=1.5+pulse;
      sdCtx.shadowBlur=15*pulse;sdCtx.shadowColor=SDC;
      sdCtx.beginPath();sdCtx.arc(cx,cy,bR,0,Math.PI*2);sdCtx.stroke();sdCtx.shadowBlur=0;
    }
    sdCtx.restore();
    sf++;
    if(sf<total) requestAnimationFrame(loop);
    else{ sdCtx.clearRect(0,0,W,H); if(cb)cb(); }
  }
  loop();
}

// Draw domain background image (crossfades in) with color overlay
function drawDomainBg(ctx,imgKey,W,H,fade,tint){
  const img=DOMAIN_IMGS[imgKey];
  if(img&&img.complete&&img.naturalWidth>0){
    ctx.save();
    ctx.globalAlpha=0.62*fade;
    // cover-fit
    const iw=img.naturalWidth,ih=img.naturalHeight;
    const scale=Math.max(W/iw,H/ih);
    const dw=iw*scale,dh=ih*scale;
    ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
    // Color tint overlay
    ctx.globalCompositeOperation='multiply';
    ctx.globalAlpha=0.45*fade;
    ctx.fillStyle=tint;ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
    // Dark vignette so text stays readable
    const vig=ctx.createRadialGradient(W/2,H/2,H*.15,W/2,H/2,H*.72);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.72)');
    ctx.globalAlpha=fade;ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

// Draw Sukuna domain only on his half of the screen (side = 'left'|'right')
function drawShrineBg(ctx,W,H,fade,side){
  const img=DOMAIN_IMGS['shrine'];
  if(!img||!img.complete||!img.naturalWidth)return;
  ctx.save();
  const half=side==='left'?0:W/2;
  const hw=W/2;
  ctx.beginPath();ctx.rect(half,0,hw,H);ctx.clip();
  ctx.globalAlpha=0.6*fade;
  const iw=img.naturalWidth,ih=img.naturalHeight;
  const scale=Math.max(W/iw,H/ih);
  const dw=iw*scale,dh=ih*scale;
  ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh);
  ctx.globalCompositeOperation='multiply';
  ctx.globalAlpha=0.5*fade;
  ctx.fillStyle='rgba(60,0,8,1)';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='source-over';
  const vig=ctx.createRadialGradient(W/2,H/2,H*.12,W/2,H/2,H*.65);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.75)');
  ctx.globalAlpha=fade;ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.restore();
}

    // Right side — Sukuna shrine overlay
    {const _sImg=DOMAIN_IMGS['shrine'];if(_sImg&&_sImg.complete&&_sImg.naturalWidth>0){const _iw=_sImg.naturalWidth,_ih=_sImg.naturalHeight,_sc=Math.max(W/_iw,H/_ih);clashCtx.globalAlpha=0.28*fade;clashCtx.drawImage(_sImg,(W-_iw*_sc)/2,(H-_ih*_sc)/2,_iw*_sc,_ih*_sc);clashCtx.globalAlpha=1;}}

    for(let i=0;i<25;i++){

    } else clashCv.style.transform='';

}

function playMahoragaSummon(cb){
  domOv.style.display='block';
  let mf=0; const total=200;
  function loop(){
    if(mf>=total){ domOv.style.display='none'; if(cb)cb(); return; }
    const W=domCv.width,H=domCv.height;
    domCtx.clearRect(0,0,W,H);
    const fade=mf<20?mf/20:mf>170?(1-(mf-170)/30):1;
    const t=mf*.04;

    // Dark background
    domCtx.fillStyle=`rgba(2,1,0,${fade})`;domCtx.fillRect(0,0,W,H);
    // Shadow eruption from ground
    const eruPct=Math.min(1,mf/60);
    for(let i=0;i<10;i++){
      const sx=W*(.1+i*.08),eruH=H*(.7+eruPct*.3)*eruPct;
      const sg=domCtx.createLinearGradient(sx,H,sx,H-eruH);
      sg.addColorStop(0,'rgba(0,0,0,.9)');sg.addColorStop(1,`rgba(${20+i*3},${10+i*2},0,.6)`);
      domCtx.globalAlpha=fade;domCtx.fillStyle=sg;
      domCtx.fillRect(sx-12,H-eruH,24,eruH);
    }
    // Mahoraga wheel appearing
    if(mf>50){
      const wPct=Math.min(1,(mf-50)/60);
      const wX=W/2,wY=H*.3,wR=H*.28*wPct;
      domCtx.save();domCtx.translate(wX,wY);domCtx.rotate(t*.5);
      domCtx.globalAlpha=.7*wPct*fade;domCtx.strokeStyle='#c8a000';domCtx.lineWidth=3.5;
      domCtx.shadowBlur=35;domCtx.shadowColor='#c8a000';
      domCtx.beginPath();domCtx.arc(0,0,wR,0,Math.PI*2);domCtx.stroke();
      for(let s=0;s<8;s++){
        const a=(s/8)*Math.PI*2;
        domCtx.beginPath();domCtx.moveTo(0,0);domCtx.lineTo(Math.cos(a)*wR,Math.sin(a)*wR);domCtx.stroke();
      }
      domCtx.shadowBlur=0;domCtx.restore();
      // Inner glow
      const ig=domCtx.createRadialGradient(wX,wY,0,wX,wY,wR*.6);
      ig.addColorStop(0,`rgba(200,160,0,${.3*wPct*fade})`);ig.addColorStop(1,'rgba(0,0,0,0)');
      domCtx.fillStyle=ig;domCtx.beginPath();domCtx.arc(wX,wY,wR*.6,0,Math.PI*2);domCtx.fill();
    }
    // Energy surge lines
    for(let i=0;i<18;i++){
      const sp=(mf*6+i*20)%240;
      if(sp<30){
        const sa=1-sp/30;
        domCtx.globalAlpha=sa*.5*fade;domCtx.strokeStyle='#c8a000';domCtx.lineWidth=1.5;
        domCtx.beginPath();
        domCtx.moveTo(W/2+Math.cos((i/18)*Math.PI*2)*H*.35,H/2+Math.sin((i/18)*Math.PI*2)*H*.35);
        domCtx.lineTo(W/2,H/2);domCtx.stroke();
      }
    }
    domCtx.globalAlpha=1;
    // Text
    if(mf>80){
      const ta=Math.min(1,(mf-80)/25)*fade;
      domCtx.globalAlpha=ta;
      domCtx.font=`bold ${W*.055}px Bebas Neue`;domCtx.textAlign='center';
      domCtx.fillStyle='#c8a000';domCtx.shadowBlur=28;domCtx.shadowColor='#c8a000';
      domCtx.fillText('MAHORAGA',W/2,H*.72);
      domCtx.font=`${W*.016}px Poppins`;domCtx.fillStyle='rgba(200,160,0,.65)';
      domCtx.fillText('八握剣異戒神将摩虎羅 — 破壊と適応',W/2,H*.79);
      domCtx.shadowBlur=0;
    }
    mf++;requestAnimationFrame(loop);
  }
  loop();
}

/* ──────────────────── combat.js ──────────────────── */
// ════════════════════════════════════════════════════════════════
//  COMBAT.JS — Damage, adaptation, shikigami, effects
// ════════════════════════════════════════════════════════════════

// Mahoraga adaptation increments per hit type
const ADAPT_STEP_NORMAL = 0.25;  // 4 hits → 100%
const ADAPT_STEP_DOMAIN = 0.34;  // 3 hits → 100%
const ADAPT_STEP_VOID   = 0.25;  // 4 rounds of passive void → 100%
const ADAPT_STEP_INF    = 0.20;  // 5 hits vs Infinity → 100%

// ── Stat helpers ─────────────────────────────────────────────────
function getStat(f,s){
  const st=f.stages[s]||0;
  const mul=st>0?1+st*.5:1/(1-st*.5);
  return Math.max(1,Math.round((f[s]||50)*mul));
}
function isStunned(f){ return f.statuses.some(s=>s.s==='stun'&&s.turns>0); }
function isSilenced(f){ return f.statuses.some(s=>s.s==='silence'&&s.turns>0); }

// ── Mahoraga adaptation ─────────────────────────────────────────
function getMahoragaAdapt(mah,sourceId){
  if(!mah.isMahoraga)return 0;
  return Math.min(1.0,(mah.mahAdapt[sourceId]?.adapt)||0);
}

function onMahoragaHit(mah,sourceId,isDomain,actor){
  if(!mah.isMahoraga)return null;
  if(!mah.mahAdapt[sourceId])
    mah.mahAdapt[sourceId]={adapt:0,isDomain,immune:false,healedAt100:false};
  const e=mah.mahAdapt[sourceId];
  const prev=e.adapt;
  const step=isDomain?ADAPT_STEP_DOMAIN:ADAPT_STEP_NORMAL;
  // Max 1 new adaptation step per same source per turn (no double-dipping)
  if(mah._adaptedThisTurn&&mah._adaptedThisTurn[sourceId])return null;
  if(!mah._adaptedThisTurn)mah._adaptedThisTurn={};
  mah._adaptedThisTurn[sourceId]=true;
  e.adapt=Math.min(1.0,e.adapt+step);
  // Heal 20% max HP on first reaching 100%
  if(prev<1.0&&e.adapt>=1.0&&!e.healedAt100){
    e.healedAt100=true;
    const heal=Math.floor(mah.maxHp*0.18);
    mah.hp=Math.min(mah.maxHp,mah.hp+heal);
    showDmgNum(heal,false,mah.isPlayer,true);
    if(sourceId==='dismantle'||sourceId==='cleave')Sound.play('adapt_sukuna');
  Sound.play('adapt_100');showAdaptBanner(sourceId);
  }
  // Domain immunity
  if(isDomain&&e.adapt>=1.0){
    e.immune=true;
    return 'domain_immune';
  }
  return null;
}

// Called each turn-end when Mahoraga is exposed to Void domain
function mahoragaAdaptVoid(mah){
  if(!mah.isMahoraga)return false;
  if(!mah.mahAdapt['void'])
    mah.mahAdapt['void']={adapt:0,isDomain:true,immune:false,healedAt100:false};
  const e=mah.mahAdapt['void'];
  if(e.adapt>=1.0)return false; // already fully adapted
  const prev=e.adapt;
  e.adapt=Math.min(1.0,e.adapt+ADAPT_STEP_VOID);
  if(prev<1.0&&e.adapt>=1.0&&!e.healedAt100){
    e.healedAt100=true;
    const heal=Math.floor(mah.maxHp*0.20);
    mah.hp=Math.min(mah.maxHp,mah.hp+heal);
    showDmgNum(heal,false,mah.isPlayer,true);
    Sound.play('adapt_100');showAdaptBanner('void');
    return 'domain_break'; // signal to break void
  }
  return Math.round(e.adapt*100); // return current %
}

// ── Infinity adaptation (on Mahoraga as attacker) ───────────────
function mahoragaAdaptInfinity(mah){
  if(!mah.isMahoraga)return 0;
  if(!mah.atkAdapt['infinito'])mah.atkAdapt['infinito']=0;
  const prev=mah.atkAdapt['infinito'];
  mah.atkAdapt['infinito']=Math.min(1.0,prev+ADAPT_STEP_INF);
  if(prev<1.0&&mah.atkAdapt['infinito']>=1.0){
    Sound.play('adapt_100');showAdaptBanner('infinito');
    return 100;
  }
  return Math.round(mah.atkAdapt['infinito']*100);
}

// ── Damage calculation ──────────────────────────────────────────
function calcDmg(att,def,move){
  let power=move.power||0;
  if(move.effects.find(e=>e.t==='adaptive'))
    power=55+Math.floor(getStat(def,'def')*.55);

  let atkStat=move.special?getStat(att,'spatk'):getStat(att,'atk');
  let defStat=move.special?getStat(def,'spdef'):getStat(def,'def');

  // Ignore DEF
  const ignDef=move.effects.find(e=>e.t==='ignore_def');
  if(ignDef)defStat=Math.floor(defStat*(1-ignDef.val));

  // Infinity passive
  let infMul=1, infBlocked=false, infAdaptPct=null;
  if(def.passive==='infinito'&&!move.special&&move.id!=='hollow'){
    const pierce=move.effects.find(e=>e.t==='pierce_inf');
    if(att.isMahoraga){
      const adapt=att.atkAdapt['infinito']||0;
      if(adapt>=1.0){
        infMul=1.0; // fully bypass
      } else {
        infMul=0.08+adapt*0.92; // scales 8% → 100%
        infBlocked=true;
        infAdaptPct=mahoragaAdaptInfinity(att); // increment & get new %
      }
    } else {
      infMul=pierce?pierce.val:0.08;
      infBlocked=infMul<1;
    }
  }

  if(def.defending)defStat=Math.floor(defStat*1.65);

  // Domain boosts
  if(move.id==='furnace'&&G.shrineTurns>0&&G.shrineOwner===att)
    power=Math.floor(power*1.5);
  if(G.shrineTurns>0&&G.shrineOwner===att&&!move.isDomain)
    power=Math.floor(power*1.12);
  if(G.chimera&&G.chimeraOwner===att&&!move.isDomain)
    power=Math.floor(power*1.1);
  if(move.id==='shadow'&&def.marked>0)
    power=Math.floor(power*1.3);

  // Simple Domain vs domain
  let sdMul=1; const sdBlocked=move.isDomain&&def.simpleDomainTurns>0;
  if(sdBlocked)sdMul=0.4;

  // Mahoraga DEF adaptation (incoming)
  let mahMul=1;
  if(def.isMahoraga){
    mahMul=1-getMahoragaAdapt(def,move.id);
  }

  // Crit
  const highCrit=move.effects.find(e=>e.t==='high_crit');
  const critChance=highCrit?.38:0.08;
  const isCrit=Math.random()<critChance;
  const critMul=isCrit?(att.passive==='rei'?2.3:1.55):1;
  const rand=0.84+Math.random()*.16;

  const dmg=Math.max(1,Math.floor(
    ((power*atkStat/Math.max(1,defStat))/5+2)*rand*critMul*infMul*sdMul*mahMul
  ));
  return{dmg,isCrit,infBlocked,sdBlocked,infAdaptPct};
}

// ── Status/effect application ───────────────────────────────────
function applyEffects(move,att,def){
  if(!move.effects)return;
  move.effects.forEach(eff=>{
    const who=eff.who==='enemy'?def:att;
    if(eff.t==='stat')
      who.stages[eff.stat]=Math.max(-6,Math.min(6,(who.stages[eff.stat]||0)+eff.stage));
    else if(eff.t==='status'){
      if(!who.statuses.find(s=>s.s===eff.s))
        who.statuses.push({s:eff.s,turns:eff.turns,kind:eff.kind});
    }
    else if(eff.t==='dot'){
      if(!who.statuses.find(s=>s.s===eff.kind&&s.isDot))
        who.statuses.push({s:eff.kind,turns:eff.turns,isDot:true,val:eff.val,kind:eff.kind,who:eff.who});
    }
    else if(eff.t==='shrine'){ G.shrineTurns=eff.turns;G.shrineOwner=att;G.shrineStack=0;G.sukunaBarrierCut=true; }
    else if(eff.t==='void'){   G.voidTurns=eff.turns;G.voidOwner=att;G.voidActive=true; }
    else if(eff.t==='chimera'){G.chimera=true;G.chimeraTurns=eff.turns;G.chimeraOwner=att; }
    else if(eff.t==='overthrow'){G.overthrow=true;G.overthrowTurns=eff.turns;G.overthrowOwner=att; }
    else if(eff.t==='heal'){
      att.hp=Math.min(att.maxHp,att.hp+eff.val);
      showDmgNum(eff.val,false,att.isPlayer,true);
      Sound.play('heal');
    }
    else if(eff.t==='cure'){
      att.statuses=att.statuses.filter(s=>!['burn','stun','silence','bind'].includes(s.s));
      Object.keys(att.stages).forEach(k=>{if(att.stages[k]<0)att.stages[k]=0;});
    }
    else if(eff.t==='lifesteal'&&def){
      const ls=Math.floor((move.power||0)*.15*eff.val);
      att.hp=Math.min(att.maxHp,att.hp+ls);
    }
    else if(eff.t==='shadow_merge'){ att.shadowMerge=eff.turns; }
    else if(eff.t==='self_cost_hp'){
      // HP cost to self (e.g. Nanami's Binding Vow sacrifice)
      att.hp=Math.max(1,att.hp-eff.val);
      showDmgNum(eff.val,false,att.isPlayer,false);
    }
    else if(eff.t==='ce_restore'){
      att.ce=Math.min(att.maxCe,att.ce+eff.val);
    }
  });
}

// ── Shikigami helpers ───────────────────────────────────────────
function getActiveShikiCount(char){
  if(!char.shikigami)return 0;
  return Object.values(char.shikigami).filter(s=>s&&s.hp>0).length;
}

function canSummon(char,shikiId){
  if(!char.shikigami)return false;
  const sk=SHIKI_DATA[shikiId];
  if(!sk||char.ce<sk.ce)return false;
  if(char.shikiCds[shikiId]>0)return false;
  if(char.shikigami[shikiId]?.hp>0)return false;
  if(getActiveShikiCount(char)>=char.shikiSlots)return false;
  return true;
}

function summonShikigami(char,shikiId){
  const sk=SHIKI_DATA[shikiId];if(!sk)return false;
  char.ce=Math.max(0,char.ce-sk.ce);
  char.shikigami[shikiId]={id:shikiId,name:sk.name,icon:sk.icon,
    hp:sk.maxHp,maxHp:sk.maxHp,atk:sk.atk,effect:sk.effect};
  return true;
}

// Shikigami intercept: 65% chance active shiki absorbs attack
async function tryShikiIntercept(actor,opp,move,isPlayer){
  if(!opp.shikigami||move.isDomain||move.isHeal||move.isBuff||move.isAoe)return false;
  const active=Object.entries(opp.shikigami).filter(([,s])=>s&&s.hp>0);
  if(!active.length)return false;
  if(Math.random()>0.65)return false;
  const [k,sk]=active[Math.floor(Math.random()*active.length)];
  const dmg=Math.max(1,Math.floor(
    ((move.power||50)*actor.atk/Math.max(1,sk.atk))/5+2
  )*(0.85+Math.random()*.15));
  sk.hp=Math.max(0,sk.hp-dmg);
  Sound.play('hit');
  showDmgNum(dmg,false,!isPlayer);shakeEl('s-battle');
  if(sk.hp<=0){
    opp.shikigami[k]=null;opp.shikiCds[k]=2;
    await typeMsgAsync(`${sk.name} shields ${opp.short} and is destroyed! (${dmg} dmg)`);
  } else {
    await typeMsgAsync(`${sk.name} intercepts the attack! ${dmg} damage absorbed!`);
  }
  updateHUD();return true;
}

async function processShikiAttacks(owner,opp,isPlayer){
  if(!owner.shikigami)return;
  for(const[k,sk]of Object.entries(owner.shikigami)){
    if(!sk||sk.hp<=0)continue;
    const cb=G.chimera&&G.chimeraOwner===owner?1.4:1.0;
    const mb=owner.shadowMerge>0?1.2:1.0;
    let dmg=Math.floor(sk.atk*cb*mb*(.85+Math.random()*.15));
    if(opp.isMahoraga)dmg=Math.floor(dmg*(1-getMahoragaAdapt(opp,'shiki_'+k)));
    opp.hp=Math.max(0,opp.hp-dmg);
    if(dmg>0){showDmgNum(dmg,false,!isPlayer);Sound.play('hit');}
    if(sk.effect==='mark')opp.marked=2;
    if(sk.effect==='silence'&&Math.random()<.35&&!opp.statuses.find(s=>s.s==='silence'))
      opp.statuses.push({s:'silence',turns:1});
    if(sk.effect==='bind'&&!opp.statuses.find(s=>s.s==='bind')){
      opp.statuses.push({s:'bind',turns:2});
      opp.stages.spd=Math.max(-6,(opp.stages.spd||0)-1);
    }
    await typeMsgAsync(`${sk.name} strikes ${opp.short}! ${dmg} damage!`);
    // Counter-attack
    if(Math.random()<.22&&opp.atk>100){
      const sd=Math.floor(opp.atk*.3);sk.hp=Math.max(0,sk.hp-sd);
      if(sk.hp<=0){owner.shikigami[k]=null;owner.shikiCds[k]=2;
        await typeMsgAsync(`${sk.name} was destroyed by the counter!`);}
    }
  }
}

// Shrine AoE helper — destroys all active shikigami of f
function shrineDestroyShikigami(f){
  if(!f.shikigami)return [];
  const killed=[];
  Object.entries(f.shikigami).forEach(([k,sk])=>{
    if(sk&&sk.hp>0){killed.push(sk.name);f.shikigami[k]=null;f.shikiCds[k]=3;}
  });
  return killed;
}

async function invokeMahoraga(isPlayer){
  const actor=isPlayer?G.pc:G.ec;
  if(actor.ce<100)return false;
  actor.ce-=100;
  if(actor.shikigami)Object.keys(actor.shikigami).forEach(k=>actor.shikigami[k]=null);
  await typeMsgAsync(`${actor.short} summons the forbidden shikigami — MAHORAGA!`);
  await new Promise(r=>playMahoragaSummon(r));
  const mah=cloneMahoraga();
  mah.hp=mah.maxHp;mah.ce=mah.maxCe;mah.isPlayer=isPlayer;
  if(isPlayer)G.pc=mah;else G.ec=mah;
  await typeMsgAsync(`MAHORAGA awakens! Primordial Adaptation active!`);
  Sound.play('summon');
  return true;
}

// ── Message system ───────────────────────────────────────────────
let _typeInt=null;
function typeMsg(txt,cb){
  if(_typeInt)clearInterval(_typeInt);
  const el=document.getElementById('msg-txt');
  const cur=document.getElementById('msg-cur');
  el.textContent='';cur.classList.remove('off');
  let idx=0;
  _typeInt=setInterval(()=>{
    if(idx<txt.length){el.textContent+=txt[idx++];}
    else{clearInterval(_typeInt);_typeInt=null;cur.classList.add('off');if(cb)cb();}
  },CONFIG.typingSpeed);
}
function typeMsgAsync(txt){return new Promise(r=>typeMsg(txt,()=>setTimeout(r,280)));}

// ── Damage numbers ───────────────────────────────────────────────
function showDmgNum(dmg,isCrit,isPlayerTaking,isHeal=false){
  const el=document.createElement('div');el.className='dmg-num';
  el.textContent=(isHeal?'+':'-')+Math.floor(dmg)+(isCrit?' !!':'');
  const W=window.innerWidth,H=window.innerHeight;
  const x=isPlayerTaking?W*.22:W*.76, y=H*(isPlayerTaking?.32:.28);
  el.style.cssText=`left:${x-40}px;top:${y}px;font-size:${isCrit?'2.2rem':'1.5rem'};
    color:${isHeal?'#44ffaa':isCrit?'#ffd700':isPlayerTaking?'#ff4455':'#55ddff'};`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}


function showAdaptBanner(sourceId){
  const names={void:'Unlimited Void',shrine:'Malevolent Shrine',chimera:'Chimera Shadow Garden',cleave:'Cleave',dismantle:'Dismantle',slash:'Slash',shiki_dogs:'Divine Dogs',shiki_nue:'Nue',shiki_serpent:'Serpent',shiki_toad:'Toad',infinito:'Infinity'};

  el.innerHTML=`<div style="font-family:var(--fn);font-size:1.05rem;letter-spacing:.18em;color:#ffaa00;text-shadow:0 0 18px #ff8800,0 0 40px #ffaa00;margin-bottom:4px">⚙ MAHORAGA ADAPTED</div><div style="font-family:var(--fn);font-size:1.55rem;letter-spacing:.12em;color:#fff;text-shadow:0 0 22px #ffaa00">to ${label}</div>`;

function shakeEl(id){

    b.textContent=`✕ MALEVOLENT SHRINE — ${G.shrineTurns}t ✕`;

function updateHUD(){
  function hpColor(p){return p>.5?'#44cc66':p>.25?'#ffaa22':'#cc2222';}
  const ehp=G.ec.hp/G.ec.maxHp, ece=G.ec.ce/G.ec.maxCe;
  document.getElementById('e-name').textContent=G.ec.short;
  document.getElementById('e-hp-fill').style.cssText=`width:${ehp*100}%;background:${hpColor(ehp)}`;
  document.getElementById('e-hp-txt').textContent=`${G.ec.hp}/${G.ec.maxHp}`;
  document.getElementById('e-ce-fill').style.cssText=`width:${ece*100}%;background:${G.ec.color}`;
  const eb=document.getElementById('e-badge');
  eb.textContent=G.ec.badge;
  eb.style.cssText=`background:${G.ec.badgeClr};color:${G.ec.badgeTxt};border:1px solid ${G.ec.badgeTxt}22;`;
  const php=G.pc.hp/G.pc.maxHp, pce=G.pc.ce/G.pc.maxCe;
  document.getElementById('p-name').textContent=G.pc.short;
  document.getElementById('p-hp-fill').style.cssText=`width:${php*100}%;background:${hpColor(php)}`;
  document.getElementById('p-hp-txt').textContent=`${G.pc.hp}/${G.pc.maxHp}`;
  document.getElementById('p-ce-fill').style.cssText=`width:${pce*100}%;background:${G.pc.color}`;
  const pb=document.getElementById('p-badge');
  pb.textContent=G.pc.badge;
  pb.style.cssText=`background:${G.pc.badgeClr};color:${G.pc.badgeTxt};border:1px solid ${G.pc.badgeTxt}22;`;
  document.getElementById('turn-ind').textContent=`TURN ${G.turn}`;

  function chips(id,f){
    const el=document.getElementById(id);if(!el)return;el.innerHTML='';
    const COL={stun:'#9b59b6',burn:'#e67e22',void:'#3498db',silence:'#e74c3c',bind:'#2ecc71',domain_cool:'#f1c40f'};
    const NM ={stun:'STUN',burn:'BURN',void:'VOID',silence:'SILENCED',bind:'BOUND',domain_cool:'OVERLOAD'};
    f.statuses.forEach(st=>{
      const c=COL[st.s]||'#888';
      const sp=document.createElement('span');sp.className='chip';
      sp.style.cssText=`background:${c}18;border:1px solid ${c}44;color:${c};`;
      sp.textContent=`${NM[st.s]||st.s.toUpperCase()} ${st.turns}t`;el.appendChild(sp);
    });
    if(f.defending){const d=document.createElement('span');d.className='chip';d.style.cssText='background:rgba(80,255,120,.08);border:1px solid rgba(80,255,120,.28);color:#55ee88;';d.textContent='DEF';el.appendChild(d);}
    if(f.simpleDomainTurns>0){const d=document.createElement('span');d.className='chip';d.style.cssText='background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.4);color:#ffd700;';d.textContent=`◎ S.D ${f.simpleDomainTurns}t`;el.appendChild(d);}
    if(f.shadowMerge>0){const d=document.createElement('span');d.className='chip';d.style.cssText='background:rgba(100,80,220,.1);border:1px solid rgba(100,80,220,.35);color:#9988ff;';d.textContent=`◈ MERGE ${f.shadowMerge}t`;el.appendChild(d);}
    if(f.marked>0){const d=document.createElement('span');d.className='chip';d.style.cssText='background:rgba(200,100,50,.1);border:1px solid rgba(200,100,50,.35);color:#dd8844;';d.textContent=`🐕 MARKED ${f.marked}t`;el.appendChild(d);}
  }

  // Megumi 50% HP danger sound (play once per threshold crossing)
  if(G.pc&&G.pc.id==='megumi'&&!G._megumiHalfPlayed&&G.pc.hp/G.pc.maxHp<=0.5&&G.pc.hp>0){
    G._megumiHalfPlayed=true;Sound.play('megumi_halfhp');BGM.danger();
  }
  chips('p-status',G.pc);chips('e-status',G.ec);

  // Shikigami panels
  function updateShikiPanel(panelId,f){
    const panel=document.getElementById(panelId);if(!panel)return;
    if(!f.shikigami){panel.classList.remove('visible');return;}
    const active=Object.values(f.shikigami).filter(s=>s&&s.hp>0);
    if(!active.length){panel.classList.remove('visible');return;}
    panel.classList.add('visible');panel.innerHTML='';
    active.forEach(sk=>{
      const row=document.createElement('div');row.className='shiki-row';
      row.innerHTML=`<div class="shiki-icon">${sk.icon}</div><div class="shiki-name">${sk.name}</div>
        <div class="shiki-hp"><div class="shiki-hp-fill" style="width:${sk.hp/sk.maxHp*100}%;"></div></div>`;
      panel.appendChild(row);
    });
  }
  updateShikiPanel('p-shiki-panel',G.pc);updateShikiPanel('e-shiki-panel',G.ec);

  // Mahoraga adapt panel
  function updateMahPanel(panelId,f){
    const panel=document.getElementById(panelId);if(!panel)return;
    const hasData=f.isMahoraga&&(Object.keys(f.mahAdapt).length||Object.keys(f.atkAdapt||{}).length);
    if(!hasData){panel.classList.remove('visible');return;}
    panel.classList.add('visible');

    const allAdapt={...f.mahAdapt};
    if(f.atkAdapt?.['infinito']>0) allAdapt['∞ infinity']={adapt:f.atkAdapt['infinito']};
    Object.entries(allAdapt).slice(-5).forEach(([id,e])=>{
      const pct=Math.round(Math.min(1,(e.adapt||0))*100);
      if(pct===0)return;
      const row=document.createElement('div');row.className='mah-adapt-row';
      row.innerHTML=`<div class="mah-adapt-lbl">${id}</div>
        <div class="mah-adapt-bar"><div class="mah-adapt-fill" style="width:${pct}%;"></div></div>
        <div class="mah-adapt-pct">${pct}%</div>`;
      panel.appendChild(row);
    });
  }
  updateMahPanel('p-mah-panel',G.pc);updateMahPanel('e-mah-panel',G.ec);
  updateDomainBanner();
  // Initiative row
  const turnLbl=document.getElementById('turn-lbl');
  if(turnLbl)turnLbl.textContent=`TURN ${G.turn||1}`;
  const pSpeed=G.pc?getStat(G.pc,'spd'):0, eSpeed=G.ec?getStat(G.ec,'spd'):0;
  const initP=document.getElementById('init-p'),initE=document.getElementById('init-e');
  if(initP&&initE){
    initP.className='init-badge'+(pSpeed>=eSpeed?' active':'');
    initE.className='init-badge'+(eSpeed>pSpeed?' enemy-act':'');
    initP.textContent=`YOU ${pSpeed>eSpeed?'⬤':''}`;
    initE.textContent=`${eSpeed>pSpeed?'⬤ ':''}ENEMY`;
  }
}

function setupMoveBtns(){
  // Show ALL moves (up to 6) directly in the skills grid — including domain & heal
  for(let i=0;i<6;i++){
    const btn=document.getElementById('mb'+i);if(!btn)continue;
    const m=G.pc.moves[i];
    if(!m){btn.style.display='none';continue;}
    btn.style.display='flex';
    // Colour accent per move type
    let borderClr=m.color||'#444';
    if(m.isDomain) borderClr='#aa44ff';
    else if(m.isHeal) borderClr='#44ffaa';
    btn.style.borderLeft=`3px solid ${borderClr}55`;
    btn.classList.toggle('domain-move',!!m.isDomain);
    btn.classList.toggle('heal-move',!!m.isHeal);
    btn.querySelector('.m-nm').textContent=m.name;
    const typeTag=m.isDomain?'◈ DOMAIN':m.isHeal?'✦ HEAL':m.isBuff?'▲ BUFF':'';
    btn.querySelector('.m-sub').textContent=`${typeTag?typeTag+' · ':''}${m.type}${m.power?' · '+m.power:''}`;
    const cd=m.cd>0?` · ⏳${m.cd}t`:(m.maxCd>0?` · CD${m.maxCd}`:'');
    const cost=m.ceUse>0?`⚡ ${m.ceUse} CE${cd}`:(cd?`Free${cd}`:'Free');
    btn.querySelector('.m-cost').textContent=cost;
    btn.querySelector('.m-cost').style.color=m.ceUse>0?'rgba(0,210,255,.6)':'rgba(100,255,140,.5)';
    const idx=i; // capture for closure
    btn.onclick=()=>doMove(idx);
    btn.onmouseenter=()=>{
      document.getElementById('ts-type').textContent=m.type||'—';
      document.getElementById('ts-pow').textContent=m.power||'VAR';
      document.getElementById('ts-ce').textContent=m.ceUse||0;
      const dmgEl=document.getElementById('ts-dmg');
      if(dmgEl){
        if(m.power&&G.pc&&G.ec&&!m.isHeal&&!m.isBuff){
          const rawAtk=m.special?getStat(G.pc,'spatk'):getStat(G.pc,'atk');
          const rawDef=m.special?getStat(G.ec,'spdef'):getStat(G.ec,'def');
          const base=Math.round(m.power*(rawAtk/rawDef)*0.42);
          dmgEl.textContent=`~${Math.round(base*.9)}–${Math.round(base*1.35)}`;
        } else if(m.isHeal){
          const hv=m.effects?.find(e=>e.t==='heal')?.val;
          dmgEl.textContent=hv?`+${hv} HP`:'HEAL';
        } else dmgEl.textContent='—';
      }
    };
    btn.onmouseleave=()=>{['ts-type','ts-pow','ts-ce'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='—';});const d=document.getElementById('ts-dmg');if(d)d.textContent='—';};
  }
  // Show/hide utility action-row buttons
  const sumBtn=document.getElementById('btn-summon');
  const sdBtn=document.getElementById('btn-simple');
  if(G.pc.hasSummon){
    if(sumBtn)sumBtn.style.display='flex';
    if(sdBtn)sdBtn.style.display='none';
  } else {
    if(sumBtn)sumBtn.style.display='none';
    if(sdBtn)sdBtn.style.display=G.pc.hasSimpleDomain?'flex':'none';
  }
  refreshMoveBtns();setupItemBtns();setupSummonBtns();
}

function setupSummonBtns(){
  if(!G.pc.hasSummon)return;
  // sb0-sb3: four shikigami; sb4: Mahoraga (irreversible)
  const shikiList=Object.values(SHIKI_DATA); // dogs, nue, serpent, toad
  shikiList.forEach((sk,i)=>{
    const btn=document.getElementById('sb'+i);if(!btn)return;
    const canS=canSummon(G.pc,sk.id);
    const isActive=G.pc.shikigami[sk.id]&&G.pc.shikigami[sk.id].hp>0;
    const cdLeft=G.pc.shikiCds[sk.id]||0;
    btn.querySelector('.s-nm').textContent=`${sk.icon} ${sk.name}`;
    let status='';
    if(isActive)status=' [ACTIVE]';
    else if(cdLeft>0)status=` | CD:${cdLeft}t`;
    const slotFull=!G.pc.shikigami&&getActiveShikiCount(G.pc)>=G.pc.shikiSlots;
    btn.querySelector('.s-sub').textContent=`CE:${sk.ce}  HP:${sk.maxHp}  ${sk.desc}${status}`;
    btn.disabled=!canS||isActive;
    btn.onclick=()=>doSummon(sk.id);
  });
  // Mahoraga — special button (sb4, full-width)
  const mahBtn=document.getElementById('sb4');
  if(mahBtn){
    const canMah=G.pc.ce>=100;
    mahBtn.querySelector('.s-nm').textContent='⚠ MAHORAGA';
    mahBtn.querySelector('.s-sub').textContent=`CE:100 — IRREVERSIBLE, sacrifices ${G.pc.short}${!canMah?' (not enough CE)':''}`;
    mahBtn.disabled=!canMah;
    mahBtn.onclick=()=>doInvokeMahoraga();
  }
}

function refreshMoveBtns(){
  // Refresh all 6 skill buttons
  for(let i=0;i<6;i++){
    const m=G.pc.moves[i];
    const btn=document.getElementById('mb'+i);
    if(!btn||btn.style.display==='none')continue;
    if(!m){btn.disabled=true;continue;}
    const silenced=isSilenced(G.pc)&&(m.ceUse||0)>0;
    const overloaded=m.isDomain&&G.pc.domainOverloaded;
    const ok=G.pc.ce>=(m.ceUse||0)&&m.cd===0&&!overloaded&&!silenced;
    btn.disabled=!ok;
    const costEl=btn.querySelector('.m-cost');
    if(costEl){
      if(m.cd>0){
        costEl.textContent=`⏳ CD ${m.cd}t`;
        costEl.style.color='rgba(255,150,50,.6)';
      } else {
        const cd=m.maxCd>0?` · CD${m.maxCd}`:'';
        costEl.textContent=m.ceUse>0?`⚡ ${m.ceUse} CE${cd}`:(cd?`Free${cd}`:'Free');
        costEl.style.color=m.ceUse>0?'rgba(0,210,255,.6)':'rgba(100,255,140,.5)';
      }
    }
  }
  // S.DOM button state
  const sbtn=document.getElementById('btn-simple');
  if(sbtn&&G.pc.hasSimpleDomain){
    sbtn.disabled=G.pc.ce<20||G.pc.simpleDomainCd>0;
    if(G.pc.simpleDomainTurns>0){sbtn.classList.add('sd-active');sbtn.textContent=`◎ S.DOM ${G.pc.simpleDomainTurns}t`;}
    else{sbtn.classList.remove('sd-active');sbtn.textContent=G.pc.simpleDomainCd>0?`◎ CD ${G.pc.simpleDomainCd}t`:'◎ S.DOM';}
  }
}
