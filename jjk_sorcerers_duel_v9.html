    active.forEach(sk=>{
      const row=document.createElement('div');row.className='shiki-row';
      row.innerHTML=`<div class="shiki-icon">${sk.icon}</div><div class="shiki-name">${sk.name}</div>
        <div class="shiki-hp"><div class="shiki-hp-fill" style="width:${sk.hp/sk.maxHp*100}%;"></div></div>`;
      panel.appendChild(row);
    });
  }
  updateShikiPanel('p-shiki-panel',G.pc);updateShikiPanel('e-shiki-panel',G.ec);

  // Mahoraga adapt panel
  function updateMahPanel(panelId,f){
    const panel=document.getElementById(panelId);if(!panel)return;
    const hasData=f.isMahoraga&&(Object.keys(f.mahAdapt).length||Object.keys(f.atkAdapt||{}).length);
    if(!hasData){panel.classList.remove('visible');return;}
    panel.classList.add('visible');
    panel.innerHTML='<div style="font-family:var(--fn);font-size:6px;color:rgba(255,200,0,.4);margin-bottom:3px;letter-spacing:2px;">ADAPTATION</div>';
    const allAdapt={...f.mahAdapt};
    if(f.atkAdapt?.['infinito']>0) allAdapt['∞ infinity']={adapt:f.atkAdapt['infinito']};
    Object.entries(allAdapt).slice(-5).forEach(([id,e])=>{
      const pct=Math.round(Math.min(1,(e.adapt||0))*100);
      if(pct===0)return;
      const row=document.createElement('div');row.className='mah-adapt-row';
      row.innerHTML=`<div class="mah-adapt-lbl">${id}</div>
        <div class="mah-adapt-bar"><div class="mah-adapt-fill" style="width:${pct}%;"></div></div>
        <div class="mah-adapt-pct">${pct}%</div>`;
      panel.appendChild(row);
    });
  }
  updateMahPanel('p-mah-panel',G.pc);updateMahPanel('e-mah-panel',G.ec);
  updateDomainBanner();
}

function setupSummonBtns(){

function setupItemBtns(){

function refreshMoveBtns(){

    const btn=document.getElementById('mb'+i);if(!btn||btn.style.display==='none')return;

/* ──────────────────── ai.js ──────────────────── */
// ════════════════════════════════════════════════════════════════
//  AI.JS — Enemy decision logic
// ════════════════════════════════════════════════════════════════

function aiChoose(){
  const e=G.ec,p=G.pc;
  const eDomain=e.moves.find(m=>m.isDomain&&m.cd===0&&e.ce>=m.ceUse&&!e.domainOverloaded&&!isSilenced(e));
  const avail=e.moves.filter(m=>!m.isDomain&&!m.isHeal&&!m.isBuff&&e.ce>=m.ceUse&&m.cd===0&&!isSilenced(e));

  // Mahoraga AI — aggressive, focuses on adapting
  if(e.isMahoraga){
    if(eDomain&&e.ce>=eDomain.ceUse&&Math.random()<.2&&!eDomain.isUltimate)
      return{type:'move',move:eDomain};
    if(!avail.length)return{type:'defend'};
    // Prefer Adaptive Cleave when Gojo's infinity is partially adapted
    const adaptive=avail.find(m=>m.id==='adaptive');
    if(adaptive&&e.atkAdapt?.['infinito']>0&&Math.random()<.5)
      return{type:'move',move:adaptive};
    return{type:'move',move:avail[Math.floor(Math.random()*avail.length)]};
  }

  // React to player domain with Simple Domain
  const playerHasDomain=(G.voidTurns>0&&G.voidOwner===p)||(G.chimera&&G.chimeraOwner===p);
  if(playerHasDomain&&e.ce>=20&&e.simpleDomainTurns===0&&e.simpleDomainCd===0
     &&e.hasSimpleDomain&&Math.random()<.6)
    return{type:'simple_domain'};

  // Counter-domain
  if((G.voidTurns>0||G.chimera)&&eDomain&&e.hp>e.maxHp*.25&&Math.random()<.7)
    return{type:'move',move:eDomain};

  // Megumi AI — summon shikigami aggressively
  if(e.hasSummon&&e.shikigami&&getActiveShikiCount(e)<e.shikiSlots&&Math.random()<.45){
    const summonable=Object.keys(SHIKI_DATA).filter(k=>canSummon(e,k));
    if(summonable.length){
      const pick=summonable[Math.floor(Math.random()*summonable.length)];
      return{type:'summon',shikiId:pick};
    }
  }

  // Offensive domain
  if(eDomain&&e.hp<e.maxHp*.42&&e.ce>=eDomain.ceUse)return{type:'move',move:eDomain};
  if(eDomain&&e.hp>e.maxHp*.75&&Math.random()<.14)return{type:'move',move:eDomain};

  // Heal
  const heal=e.moves.find(m=>m.isHeal&&m.cd===0&&e.ce>=m.ceUse);
  if(heal&&e.hp<e.maxHp*.35&&Math.random()<.72)return{type:'move',move:heal};

  // Low CE — defend
  if(e.ce<22&&Math.random()<.55)return{type:'defend'};
  if(!avail.length)return{type:'defend'};

  // Finish player
  if(p.hp<p.maxHp*.3)
    return{type:'move',move:avail.sort((a,b)=>(b.power||80)-(a.power||80))[0]};

  return{type:'move',move:avail[Math.floor(Math.random()*avail.length)]};
}


/* ──────────────────── game.js ──────────────────── */
// ════════════════════════════════════════════════════════════════
//  GAME.JS — Main game loop, turn execution, player actions
// ════════════════════════════════════════════════════════════════

let G = {}; // Global game state — populated by initGame()

// ── Player action shortcuts ───────────────────────────────────────
function doMove(idx){
  if(G.busy)return;
  const regularMoves=G.pc.moves.filter(m=>!m.isDomain&&!m.isBuff).slice(0,4);
  const m=regularMoves[idx];
  if(!m||G.pc.ce<m.ceUse||m.cd>0||(isSilenced(G.pc)&&m.ceUse>0))return;
  closeMoves();executeTurn({type:'move',move:m});
}
function doDefend(){if(G.busy)return;executeTurn({type:'defend'});}
function doDomain(){
  if(G.busy)return;
  const dm=G.pc.moves.find(m=>m.isDomain);
  if(!dm||G.pc.ce<dm.ceUse||dm.cd>0||G.pc.domainOverloaded)return;
  executeTurn({type:'move',move:dm});
}
function doSimpleDomain(){
  if(G.busy||!G.pc.hasSimpleDomain)return;
  if(G.pc.ce<20||G.pc.simpleDomainCd>0||G.pc.simpleDomainTurns>0)return;
  executeTurn({type:'simple_domain'});
}
function doSummon(shikiId){
  if(G.busy)return;
  if(!canSummon(G.pc,shikiId))return;
  closeSummon();executeTurn({type:'summon',shikiId});
}
function doInvokeMahoraga(){
  if(G.busy)return;
  if(G.pc.ce<100){closeSummon();return;}
  closeSummon();executeTurn({type:'invoke_mahoraga'});
}
function doItem(idx){
  if(G.busy)return;
  const item=G.pc.items[idx];
  if(!item||item.count<=0)return;
  closeItems();executeTurn({type:'item',item});
}

// ── Main turn executor ────────────────────────────────────────────
async function executeTurn(pAction){
  if(G.busy)return;
  // Invoke Mahoraga — special case (replaces the player entirely)
  if(pAction.type==='invoke_mahoraga'){
    G.busy=true;hideActions();G.turn++;
    await invokeMahoraga(true);
    setupMoveBtns();updateHUD();
    G.busy=false;showActions();return;
  }

  G.busy=true;hideActions();G.turn++;
  const eAction=aiChoose();

  // Domain clash
  const pIsDomain=pAction.type==='move'&&pAction.move?.isDomain;
  const eIsDomain=eAction.type==='move'&&eAction.move?.isDomain;
  if(pIsDomain&&eIsDomain&&!G.domainClash){
    G.domainClash=true;
    await typeMsgAsync(`Two domains expand at the same time!`);
    await new Promise(r=>playDomainClash(r));
    const pPow=pAction.move.power||50,ePow=eAction.move.power||50;
    if(pPow>ePow){await typeMsgAsync(`${G.pc.short}'s domain prevails!`);await doTurnAction(G.pc,G.ec,pAction,true);}
    else if(ePow>pPow){await typeMsgAsync(`${G.ec.short}'s domain prevails!`);await doTurnAction(G.ec,G.pc,eAction,false);}
    else{await typeMsgAsync(`The domains cancel each other! No effect.`);}
    G.domainClash=false;
  } else if(pAction.type==='item'||pAction.type==='simple_domain'||pAction.type==='summon'){
    await doTurnAction(G.pc,G.ec,pAction,true);
    if(G.pc.hp>0&&G.ec.hp>0)await doTurnAction(G.ec,G.pc,eAction,false);
  } else {
    const pSpd=getStat(G.pc,'spd'),eSpd=getStat(G.ec,'spd');
    const order=pSpd>=eSpd?
      [[G.pc,G.ec,pAction,true],[G.ec,G.pc,eAction,false]]:
      [[G.ec,G.pc,eAction,false],[G.pc,G.ec,pAction,true]];
    for(const[actor,opp,act,isP]of order){
      if(G.pc.hp<=0||G.ec.hp<=0)break;
      await doTurnAction(actor,opp,act,isP);
    }
  }

  if(G.pc.hp<=0){endBattle(false);return;}
  if(G.ec.hp<=0){endBattle(true);return;}

  // Turn-end effects
  if(await processTurnEnd(G.pc,G.pc.short)){endBattle(false);return;}
  if(await processTurnEnd(G.ec,G.ec.short)){endBattle(true);return;}

  // Decrement domain timers
  if(G.shrineTurns>0){G.shrineTurns--;if(!G.shrineTurns){G.shrineStack=0;G.sukunaBarrierCut=false;if(!G.voidTurns&&!G.chimera)G.domainBgActive=false;await typeMsgAsync(`Malevolent Shrine dissipated.`);}}
  if(G.voidTurns>0){G.voidTurns--;if(!G.voidTurns){G.voidActive=false;if(!G.shrineTurns&&!G.chimera)G.domainBgActive=false;await typeMsgAsync(`Unlimited Void dissipated.`);}}
  if(G.chimeraTurns>0){G.chimeraTurns--;if(!G.chimeraTurns){G.chimera=false;if(!G.voidTurns&&!G.shrineTurns)G.domainBgActive=false;await typeMsgAsync(`Chimera Shadow Garden dissipated.`);}}
  if(G.overthrowTurns>0){G.overthrowTurns--;if(!G.overthrowTurns){G.overthrow=false;await typeMsgAsync(`Divine Overthrow ended.`);}}

  // Shrine barrier drain
  if(G.shrineTurns>0){
    [G.pc,G.ec].forEach(f=>{
      if(f.barrierHp>0&&G.shrineOwner!==f)
        f.barrierHp=Math.max(0,f.barrierHp-Math.floor(f.barrierMaxHp*.15));
    });
  }

  // Move CDs
  G.pc.moves.forEach(m=>{if(m.cd>0)m.cd--;});
  G.ec.moves.forEach(m=>{if(m.cd>0)m.cd--;});

  // Overload flags
  G.pc.domainOverloaded=G.pc.statuses.some(s=>s.s==='domain_cool');
  G.ec.domainOverloaded=G.ec.statuses.some(s=>s.s==='domain_cool');

  // Simple Domain CDs
  if(G.pc.simpleDomainTurns>0){G.pc.simpleDomainTurns--;if(!G.pc.simpleDomainTurns)await typeMsgAsync(`${G.pc.short}'s Simple Domain faded.`);}
  if(G.ec.simpleDomainTurns>0){G.ec.simpleDomainTurns--;if(!G.ec.simpleDomainTurns)await typeMsgAsync(`${G.ec.short}'s Simple Domain faded.`);}
  if(G.pc.simpleDomainCd>0)G.pc.simpleDomainCd--;
  if(G.ec.simpleDomainCd>0)G.ec.simpleDomainCd--;

  updateHUD();
  G.busy=false;showActions();
}

// ── Per-action execution ──────────────────────────────────────────
async function doTurnAction(actor,opp,action,isPlayer){
  if(isStunned(actor)&&action.type!=='defend'&&action.type!=='simple_domain'){
    await typeMsgAsync(`${actor.short} is paralyzed and cannot act!`);return;
  }

  if(action.type==='defend'){
    actor.defending=true;Sound.play('defend');
    await typeMsgAsync(`${actor.short} takes a defensive stance!`);

  } else if(action.type==='simple_domain'){
    if(!actor.hasSimpleDomain)return; // safety check
    actor.ce=Math.max(0,actor.ce-20);
    actor.simpleDomainTurns=2;actor.simpleDomainCd=3;
    Sound.play('simple_domain');
    await typeMsgAsync(`${actor.short} activates Simple Domain! Protective barrier for 2 turns!`);
    await new Promise(r=>playSimpleDomain(actor,isPlayer,r));
  G.domainBgActive=true;

  } else if(action.type==='summon'){
    const sk=SHIKI_DATA[action.shikiId];
    if(sk&&canSummon(actor,action.shikiId)){
      summonShikigami(actor,action.shikiId);
      spawnFX('shadow',{isPlayer,color:actor.color});
      Sound.play('summon');
      await typeMsgAsync(`${actor.short} summons ${sk.name}! (CE: -${sk.ce})`);
    }

  } else if(action.type==='item'){
    const item=action.item;item.count--;
    if(item.id==='hp'){
      const h=80;actor.hp=Math.min(actor.maxHp,actor.hp+h);
      showDmgNum(h,false,isPlayer,true);Sound.play('heal');
      await typeMsgAsync(`${actor.short} uses ${item.name}! +80 HP`);
    } else if(item.id==='ce'){
      actor.ce=Math.min(actor.maxCe,actor.ce+50);
      await typeMsgAsync(`${actor.short} uses ${item.name}! +50 CE`);
    }

  } else if(action.type==='move'){
    const m=action.move;
    actor.ce=Math.max(0,actor.ce-m.ceUse);
    if(m.maxCd>0)actor.moves.find(mv=>mv.id===m.id).cd=m.maxCd;

    if(m.isDomain){
      await _handleDomainMove(actor,opp,m,isPlayer);

    } else if(m.isHeal){
      spawnFX('reversal',{isPlayer,color:actor.color});
      Sound.play('heal');
      applyEffects(m,actor,opp);
      await typeMsgAsync(`${actor.short} uses ${m.name}! Recovers HP!`);

    } else if(m.isBuff){
      spawnFX('shadow',{isPlayer,color:actor.color});
      applyEffects(m,actor,opp);
      await typeMsgAsync(`${actor.short} uses ${m.name}! Shikigami empowered!`);

    } else {
      // Regular attack
      if(isSilenced(actor)&&m.ceUse>0){await typeMsgAsync(`${actor.short} is silenced and cannot use techniques!`);return;}
      if(Math.random()*100>m.acc){Sound.play('miss');await typeMsgAsync(`${actor.short} uses ${m.name}... but missed!`);return;}

      // AoE moves (Furnace) — hit opponent AND all active shikigami
      if(m.isAoe&&opp.shikigami){
        spawnFX(m.id,{isPlayer,color:actor.color});
        const {dmg,isCrit}=calcDmg(actor,opp,m);
        opp.hp=Math.max(0,opp.hp-dmg);showDmgNum(dmg,isCrit,!isPlayer);
        Sound.play(isCrit?'crit':'hit');shakeEl('s-battle');
        const killed=shrineDestroyShikigami(opp);
        let msg=`${actor.short} uses ${m.name}! ${dmg} damage${isCrit?' — CRITICAL!':''}!`;
        if(killed.length)msg+=` ${killed.join(', ')} caught in the blast!`;
        applyEffects(m,actor,opp);
        await typeMsgAsync(msg);
        updateHUD();return;
      }

      // Shikigami intercept
      const intercepted=await tryShikiIntercept(actor,opp,m,isPlayer);
      if(intercepted){updateHUD();return;}

      spawnFX(m.id==='basic'&&actor.id==='sukuna'?'basic_sukuna':m.id,{isPlayer,color:actor.color});

      // Multi-hit (Mahoraga)
      if(m.effects.find(e=>e.t==='multi_hit')&&actor.isMahoraga){
        const hits=1+Math.floor(Math.random()*3);let totalDmg=0;
        for(let h=0;h<hits;h++){
          if(opp.hp<=0)break;
          const {dmg,isCrit,infAdaptPct}=calcDmg(actor,opp,m);
          opp.hp=Math.max(0,opp.hp-dmg);totalDmg+=dmg;
          if(opp.isMahoraga)onMahoragaHit(opp,m.id,false,actor);
          opp.stages.def=Math.max(-6,(opp.stages.def||0)-.5);
          Sound.play(isCrit?'crit':'hit');shakeEl('s-battle');showDmgNum(dmg,isCrit,!isPlayer);
          if(infAdaptPct){await typeMsgAsync(`MAHORAGA adapts to Infinity: ${infAdaptPct}%!${infAdaptPct>=100?' — Infinity NULLIFIED!':''}`);}
          await new Promise(r=>setTimeout(r,180));
        }
        applyEffects(m,actor,opp);
        await typeMsgAsync(`${actor.short} uses ${m.name}! ${hits} hits — total ${totalDmg} damage!`);

      } else {
        if(opp.isMahoraga)onMahoragaHit(opp,m.id,false,actor);
        const {dmg,isCrit,infBlocked,sdBlocked,infAdaptPct}=calcDmg(actor,opp,m);
        if(m.effects.find(e=>e.t==='lifesteal')){
          const ls=Math.floor(dmg*.25);actor.hp=Math.min(actor.maxHp,actor.hp+ls);
          showDmgNum(ls,false,isPlayer,true);
        }
        opp.hp=Math.max(0,opp.hp-dmg);
        Sound.play(isCrit?'crit':'hit');showDmgNum(dmg,isCrit,!isPlayer);shakeEl('s-battle');
        let msg=`${actor.short} uses ${m.name}! ${dmg} damage${isCrit?' — CRITICAL!':''}!`;
        if(infBlocked&&!actor.isMahoraga)msg+=' (Infinity absorbed it!)';
        if(sdBlocked)msg+=' (Simple Domain reduced 60%!)';
        if(infAdaptPct){msg+=` MAHORAGA adapts to Infinity: ${infAdaptPct}%!${infAdaptPct>=100?' INFINITY NULLIFIED!':''}`;}
        applyEffects(m,actor,opp);
        await typeMsgAsync(msg);
      }
    }
    updateHUD();
  }
  actor.defending=false;
}

// ── Domain move handler ───────────────────────────────────────────
async function _handleDomainMove(actor,opp,m,isPlayer){
  const oppSD=opp.simpleDomainTurns>0;
  const domType=actor.id==='gojo'?'void':actor.id==='sukuna'?'shrine':'chimera';
  Sound.play(domType==='void'?'void':domType==='shrine'?'shrine':'chimera');

  if(oppSD){
    await typeMsgAsync(`${actor.short} expands ${m.name}! But ${opp.short}'s Simple Domain neutralizes it!`);
    spawnFX(domType==='shrine'?'dismantle':domType==='chimera'?'shadow':'blue',{isPlayer,color:actor.color});
    if(Math.random()*100<=m.acc){
      const{dmg,isCrit}=calcDmg(actor,opp,m);
      opp.hp=Math.max(0,opp.hp-dmg);showDmgNum(dmg,isCrit,!isPlayer);shakeEl('s-battle');
      await typeMsgAsync(`Simple Domain reduced damage 60%! ${opp.short} takes ${dmg}${isCrit?' — CRITICAL!':''}!`);
    } else {
      await typeMsgAsync(`${m.name} completely blocked by Simple Domain!`);
    }
    applyEffects(m,actor,opp);
    actor.domainOverloaded=true;actor.statuses.push({s:'domain_cool',turns:1});
    await typeMsgAsync(`${actor.short} suffers cerebral overload!`);
    return;
  }

  if(m.isUltimate){
    await typeMsgAsync(`${actor.short} channels DIVINE OVERTHROW! Next turn — total destruction!`);
    applyEffects(m,actor,opp);
    actor.domainOverloaded=true;actor.statuses.push({s:'domain_cool',turns:1});
    const recoil=Math.floor(actor.maxHp*.4);
    actor.hp=Math.max(1,actor.hp-recoil);
    await typeMsgAsync(`RECOIL: Mahoraga loses ${recoil} HP from the adaptation strain!`);
    return;
  }

  // Normal domain expansion
  await typeMsgAsync(`${actor.short} expands their domain — ${m.name}!`);
  if(m.barrierHp){actor.barrierHp=m.barrierHp;actor.barrierMaxHp=m.barrierHp;}
  await new Promise(r=>playDomain(domType,r));
  G.domainBgActive=true;

  // Mahoraga domain check — immune?
  if(opp.isMahoraga){
    const res=onMahoragaHit(opp,m.id,true,actor);
    if(res==='domain_immune'){
      Sound.play('domain_break');
      await typeMsgAsync(`MAHORAGA immediately shatters ${m.name}! Domain BROKEN!`);
      actor.barrierHp=0;actor.barrierMaxHp=0;
      // Cancel domain effects
      if(m.id==='void'){G.voidTurns=0;G.voidActive=false;}
      else if(m.id==='shrine'){G.shrineTurns=0;G.shrineStack=0;G.sukunaBarrierCut=false;}
      else if(m.id==='chimera'){G.chimera=false;G.chimeraTurns=0;}
      if(!G.voidTurns&&!G.shrineTurns&&!G.chimera)G.domainBgActive=false;
      actor.domainOverloaded=true;actor.statuses.push({s:'domain_cool',turns:1});
      await typeMsgAsync(`${actor.short} suffers cerebral overload!`);
      updateHUD();return;
    }
    const adaptPct=Math.round((opp.mahAdapt[m.id]?.adapt||0)*100);
    if(adaptPct>0)await typeMsgAsync(`MAHORAGA adapts to ${m.name}: ${adaptPct}%`);
  }

  const{dmg,isCrit}=calcDmg(actor,opp,m);
  opp.hp=Math.max(0,opp.hp-dmg);showDmgNum(dmg,isCrit,!isPlayer);shakeEl('s-battle');

  // Shrine AoE — destroy all active shikigami
  if(m.id==='shrine'||m.isAoe){
    const killed=shrineDestroyShikigami(opp);
    if(killed.length)await typeMsgAsync(`Malevolent Shrine's blades obliterate ${killed.join(', ')}!`);
  }

  applyEffects(m,actor,opp);
  actor.domainOverloaded=true;actor.statuses.push({s:'domain_cool',turns:1});
  await typeMsgAsync(`${actor.short} suffers cerebral overload!`);
  updateHUD();
}

// ── Turn-end processing ───────────────────────────────────────────
async function processTurnEnd(f,name){
  let dead=false;

  // DoT damage
  const dots=f.statuses.filter(s=>s.isDot&&s.turns>0);
  for(const dot of dots){
    const d=Math.floor(f.maxHp*dot.val);
    f.hp=Math.max(0,f.hp-d);showDmgNum(d,false,f.isPlayer);Sound.play('hit');
    await typeMsgAsync(`${name} suffers ${d} damage from ${dot.kind||'DoT'}!`);
    dot.turns--;if(f.hp<=0){dead=true;break;}
  }


  // Mahoraga passive adaptation — once hit by something, keeps adapting each turn
  if(f.isMahoraga&&f.mahAdapt){
    Object.entries(f.mahAdapt).forEach(([sid,e])=>{
      if(e.adapt>0&&e.adapt<1.0&&!e.immune){
        const prev=e.adapt;
        e.adapt=Math.min(1.0,e.adapt+ADAPT_STEP_NORMAL);
        if(prev<1.0&&e.adapt>=1.0&&!e.healedAt100){
          e.healedAt100=true;
          const heal=Math.floor(f.maxHp*0.20);
          f.hp=Math.min(f.maxHp,f.hp+heal);
          showDmgNum(heal,false,f.isPlayer,true);
          Sound.play('adapt_100');showAdaptBanner(sid);
        }
      }
    });
  }
  // Decrement statuses
  f.statuses=f.statuses.filter(s=>{
    if(s.isDot)return s.turns>0;
    s.turns--;
    if(s.s==='domain_cool')f.domainOverloaded=false;
    return s.turns>0;
  });

  // Shrine AoE auto-slashes — furnace damage scaling
  if(G.shrineTurns>0&&G.shrineOwner&&G.shrineOwner!==f){
    const furnace=Math.min(0.04,G.shrineStack*0.01);
    const shrD=Math.floor(f.maxHp*(0.065+furnace));
    G.shrineStack++;
    f.hp=Math.max(0,f.hp-shrD);showDmgNum(shrD,false,f.isPlayer);Sound.play('shrine');
    await typeMsgAsync(`Malevolent Shrine auto-slashes — ${name} loses ${shrD} HP! (Furnace: +${Math.round(furnace*100)}%)`);
    // Shrine also destroys shikigami each round
    const killed=shrineDestroyShikigami(f);
    if(killed.length)await typeMsgAsync(`Shrine's blades destroy ${killed.join(', ')}!`);
    if(f.barrierHp>0){
      const cutD=Math.floor(f.barrierHp*.22);
      f.barrierHp=Math.max(0,f.barrierHp-cutD);
      await typeMsgAsync(`Sukuna cuts the barrier from outside! (-${cutD} integrity)`);
    }
    if(f.hp<=0)dead=true;
  }

  // Void mental damage
  if(G.voidActive&&G.voidOwner&&G.voidOwner!==f&&!isStunned(f)){
    const vD=Math.floor(f.maxHp*.08);
    f.hp=Math.max(0,f.hp-vD);showDmgNum(vD,false,f.isPlayer);Sound.play('void');
    if(!f.statuses.find(s=>s.s==='stun'))f.statuses.push({s:'stun',turns:1});
    await typeMsgAsync(`Unlimited Void paralyzes ${name}! Mental damage: ${vD}`);
    if(f.hp<=0)dead=true;
  }

  // Mahoraga passively adapts to Void each round (even while paralyzed)
  if(f.isMahoraga&&G.voidActive&&G.voidOwner!==f){
    const result=mahoragaAdaptVoid(f);
    if(result==='domain_break'){
      G.voidTurns=0;G.voidActive=false;Sound.play('domain_break');
      await typeMsgAsync(`MAHORAGA fully adapted to Unlimited Void — domain SHATTERED!`);
    } else if(typeof result==='number'){
      await typeMsgAsync(`MAHORAGA turns the dharma wheel — Void adaptation: ${result}%`);
    }
  }

  // Divine Overthrow DoT
  if(G.overthrow&&G.overthrowOwner&&G.overthrowOwner!==f){
    const oD=200;
    f.hp=Math.max(0,f.hp-oD);showDmgNum(oD,true,f.isPlayer);Sound.play('hit');
    if(!f.statuses.find(s=>s.s==='silence'))f.statuses.push({s:'silence',turns:1});
    await typeMsgAsync(`Divine Overthrow strikes ${name} — ${oD} damage! Silenced!`);
    if(f.hp<=0)dead=true;
  }

  // Shikigami attacks
  if(f.shikigami&&Object.values(f.shikigami).some(s=>s&&s.hp>0)){
    const opp=f.isPlayer?G.ec:G.pc;
    await processShikiAttacks(f,opp,f.isPlayer);
  }

  // CE regen
  f.ce=Math.min(f.maxCe,f.ce+(f.ceRegen||12));
  // Countdown timers
  if(f.shadowMerge>0)f.shadowMerge--;
  if(f.marked>0)f.marked--;
  if(f.shikiCds)Object.keys(f.shikiCds).forEach(k=>{if(f.shikiCds[k]>0)f.shikiCds[k]--;});

  return dead;
}

// ── End battle ────────────────────────────────────────────────────
function endBattle(playerWon){
  G.busy=false;
  const res=document.getElementById('go-res'),sub=document.getElementById('go-sub');
  if(playerWon){
    res.textContent='VICTORY';res.style.color='#00d4ff';res.style.textShadow='0 0 55px rgba(0,180,255,.5)';
    sub.textContent=`${G.pc.short} prevails.`;
  } else {
    res.textContent='DEFEAT';res.style.color='#e01030';res.style.textShadow='0 0 55px rgba(200,0,30,.5)';
    sub.textContent=`${G.ec.short} is the strongest.`;
  }
  setTimeout(()=>showScreen('s-over'),900);
}

// ── Boot ──────────────────────────────────────────────────────────
preloadImages(()=>{
  document.getElementById('btn-start').onclick=showSelect;
  showTitle();
});
